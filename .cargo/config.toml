[profile.dev]
debug = 0

[profile.test]
debug = 0

# Do not force `SKIP_WASM_BUILD` globally.
# Setting it here causes runtime/build.rs to generate a stub `wasm_binary.rs`
# (WASM_BINARY = None), which breaks node startup for dev/local chains.
#
# Opt-in only when you explicitly want faster compile/check loops without
# embedded runtime WASM:
#   SKIP_WASM_BUILD=1 cargo check


