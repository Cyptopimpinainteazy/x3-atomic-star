# X3 ProofForge Claims Registry
# Every claim must have receipts and evidence to be VERIFIED
version: "1.0.0"
last_updated: "2026-04-26"

claims:
  # S0 Critical Claims - Must pass for mainnet
  x3.asset_kernel.supply_conservation:
    statement: "canonical_supply == native + evm + svm + external_locked + pending"
    criticality: S0
    tags: [supply, invariant, asset-kernel]
    status: UNVERIFIED
    evidence_required:
      - asset_kernel_supply_test
      - cross_vm_supply_proof
      - supply_invariant_monitor
    blockers: []
    
  x3.bridge.replay_protection:
    statement: "A bridge message cannot execute more than once"
    criticality: S0
    tags: [bridge, security, replay]
    status: VERIFIED
    evidence_required:
      - replay_guard_test
      - nonce_tracking_proof
      - duplicate_message_rejection_test
    blockers: []
    
  x3.bridge.finality_verification:
    statement: "X3 never mints from fake, stale, wrong-chain, wrong-height, or malformed finality proofs"
    criticality: S0
    tags: [bridge, security, finality]
    status: VERIFIED
    evidence_required:
      - finality_verifier_test
      - fake_proof_rejection_test
      - stale_proof_rejection_test
      - wrong_chain_rejection_test
    blockers: []
    
  x3.atomic.one_terminal_state:
    statement: "Every cross-VM atomic operation ends in exactly one terminal state"
    criticality: S0
    tags: [atomic, cross-vm, determinism]
    status: VERIFIED
    evidence_required:
      - atomic_state_machine_test
      - no_partial_commit_test
      - deterministic_rollback_test
    blockers: []
    
  x3.atomic.rollback_safety:
    statement: "If any EVM/SVM/X3VM leg fails, the operation rolls back or refunds safely"
    criticality: S0
    tags: [atomic, cross-vm, safety]
    status: VERIFIED
    evidence_required:
      - cross_vm_rollback_test
      - partial_failure_handling_test
      - refund_path_test
    blockers: []
    
  x3.flashloan.repay_or_revert:
    statement: "Every flashloan is repaid with required fee or all state changes revert"
    criticality: S0
    tags: [flashloan, security, invariant]
    status: VERIFIED
    evidence_required:
      - flashloan_repay_test
      - flashloan_revert_test
      - fee_validation_test
      - reentrancy_protection_test
    blockers: []
    
  x3.x3vm.determinism:
    statement: "Same input/state/bytecode always produces same output/state root"
    criticality: S0
    tags: [x3vm, determinism, execution]
    status: VERIFIED
    evidence_required:
      - x3vm_determinism_test
      - state_root_consistency_test
      - execution_replay_test
    blockers: []
    
  x3.x3lang.compiler_reproducibility:
    statement: "Same x3-lang source and compiler version produce same bytecode/ABI hash"
    criticality: S0
    tags: [x3lang, compiler, determinism]
    status: VERIFIED
    evidence_required:
      - compiler_determinism_test
      - bytecode_hash_stability_test
      - abi_hash_stability_test
    blockers: []
    
  x3.contracts.evm_svm_parity:
    statement: "Core EVM contracts and SVM programs implement equivalent X3 behavior"
    criticality: S0
    tags: [contracts, cross-vm, parity]
    status: VERIFIED
    evidence_required:
      - evm_svm_behavior_test
      - cross_vm_invariant_test
      - message_format_parity_test
    blockers: []
    
  x3.governance.proof_gated_upgrade:
    statement: "Critical upgrades require proof receipt, timelock/multisig, and migration proof"
    criticality: S0
    tags: [governance, upgrade, safety]
    status: VERIFIED
    evidence_required:
      - upgrade_gate_test
      - proof_requirement_enforcement_test
      - timelock_bypass_prevention_test
    blockers: []
    
  # S1 Security Claims
  x3.gpu.cpu_gpu_parity:
    statement: "GPU-accelerated execution/verification matches CPU reference results"
    criticality: S1
    tags: [gpu, determinism, performance]
    status: PARTIAL
    evidence_required:
      - cpu_gpu_parity_test
      - gpu_verification_test
      - fallback_safety_test
    blockers: []
    
  x3.onboarding.developer_first_value:
    statement: "A fresh developer can deploy and test a first X3 app with measured time-to-first-value"
    criticality: S1
    tags: [onboarding, ux, developer]
    status: PARTIAL
    evidence_required:
      - onboarding_flow_test
      - time_to_first_deploy_metric
      - success_rate_metric
    blockers: []
    
  x3.funding.milestone_receipts:
    statement: "Every funding ask maps to a milestone, deliverable, budget, and proof receipt"
    criticality: S1
    tags: [funding, governance, transparency]
    status: PARTIAL
    evidence_required:
      - funding_milestone_mapping
      - receipt_coverage_report
      - budget_tracking_proof
    blockers: []
    
  x3.evolution.no_regression:
    statement: "New generations must beat prior generations without S0/S1 regressions"
    criticality: S1
    tags: [evolution, quality, regression]
    status: UNVERIFIED
    evidence_required:
      - fitness_comparison_test
      - regression_detection_test
      - rollback_capability_test
    blockers: []

# Evidence types
evidence_types:
  - name: unit_test
    weight: 1.0
    required: true
  - name: integration_test
    weight: 1.5
    required: true
  - name: invariant_test
    weight: 2.0
    required: true
  - name: fuzz_test
    weight: 1.5
    required: false
  - name: formal_proof
    weight: 3.0
    required: false
  - name: mutation_test
    weight: 2.0
    required: false
  - name: benchmark
    weight: 1.0
    required: false
  - name: security_audit
    weight: 2.5
    required: false
  - name: chaos_test
    weight: 2.0
    required: false

# Proof status definitions
statuses:
  VERIFIED: "Claim has fresh receipts and passing tests"
  PARTIAL: "Some evidence exists but gaps remain"
  FAILED: "Evidence shows claim is false"
  UNVERIFIED: "No evidence or receipts exist"
  STALE: "Evidence exists but is outdated by code changes"
  BLOCKED: "Cannot verify due to missing dependencies"
  REVOKED: "Previously verified but now invalid"
