name: Build & Test

on:
  pull_request:
    branches: [main, develop, sprint-*]
  push:
    branches: [main, develop, sprint-*]
  workflow_dispatch:
    inputs:
      run_fragile:
        description: "Run fragile advanced checks (Loom/Shuttle/Kani/Miri/Sanitizers)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: 1.89.0

jobs:
  format:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check

  lint:
    name: Clippy Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [lib, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (${{ matrix.test-type }})
        run: |
          if [ "${{ matrix.test-type }}" == "lib" ]; then
            cargo test --lib --all
          else
            cargo test --test '*' --all
          fi
        timeout-minutes: 60

  build-release:
    name: Build Release Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build -p x3-chain-node --release
        timeout-minutes: 120

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --version 0.35.4 --locked --force
      - name: Generate coverage
        run: cargo tarpaulin --out Xml --output-dir coverage/ --timeout 300 --exclude-files tests/*
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  advanced-test-gate:
    name: Advanced Test Gate (Deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Run advanced test gate (ci deterministic quick)
        run: |
          chmod +x scripts/test-all-advanced.sh
          ./scripts/test-all-advanced.sh --ci --quick

  advanced-fragile-loom:
    name: Advanced Fragile - Loom
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install nightly for fragile lane
        run: rustup toolchain install nightly --profile minimal
      - name: Loom runtime interleavings
        run: |
          LOOM_MAX_PREEMPTIONS=3 cargo +nightly test -p x3-gateway \
            --test loom_mempool_concurrency --features loom-tests -- --nocapture

  advanced-fragile-shuttle:
    name: Advanced Fragile - Shuttle
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install nightly for fragile lane
        run: rustup toolchain install nightly --profile minimal
      - name: Shuttle randomized scheduling
        run: |
          cargo +nightly test -p x3-gateway --test shuttle_validator_async shuttle_ -- --nocapture

  advanced-fragile-kani:
    name: Advanced Fragile - Kani
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install Kani
        run: cargo install kani-verifier || true
      - name: Kani harnesses
        run: |
          cargo +stable kani --harness prove_fee_no_overflow
          cargo +stable kani --harness prove_accounting_conserved

  advanced-fragile-miri:
    name: Advanced Fragile - Miri
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install Miri component
        run: rustup component add miri
      - name: Miri UB check (x3-proof)
        run: |
          MIRIFLAGS="-Zmiri-strict-provenance" cargo +nightly miri test -p x3-proof --lib

  advanced-fragile-sanitizers:
    name: Advanced Fragile - Sanitizers
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Memory sanitizer compile
        run: |
          RUSTFLAGS="-Zsanitizer=memory" cargo +nightly build -p x3-proof --lib --target x86_64-unknown-linux-gnu
      - name: Thread sanitizer compile
        run: |
          RUSTFLAGS="-Zsanitizer=thread" cargo +nightly test --tests -p x3-gateway --target x86_64-unknown-linux-gnu --no-run
