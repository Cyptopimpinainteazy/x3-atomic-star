name: Build & Test

on:
  pull_request:
    branches: [main, develop, sprint-*]
  push:
    branches: [main, develop, sprint-*]
  workflow_dispatch:
    inputs:
      run_fragile:
        description: "Run fragile advanced checks (Loom/Shuttle/Kani/Miri/Sanitizers)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: 1.89.0

jobs:
  format:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check

  lint:
    name: Clippy Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
          components: clippy
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [lib, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (${{ matrix.test-type }})
        run: |
          if [ "${{ matrix.test-type }}" == "lib" ]; then
            cargo test --lib --all
          else
            cargo test --test '*' --all
          fi
        timeout-minutes: 60

  build-release:
    name: Build Release Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build -p x3-chain-node --release
        timeout-minutes: 120

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --version 0.35.4 --locked --force
      - name: Generate coverage
        run: cargo tarpaulin --out Xml --output-dir coverage/ --timeout 300 --exclude-files tests/*
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  advanced-test-gate:
    name: Advanced Test Gate (Deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Run advanced test gate (ci deterministic quick)
        run: |
          chmod +x scripts/test-all-advanced.sh
          ./scripts/test-all-advanced.sh --ci --quick

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - uses: Swatinem/rust-cache@v2
      - name: Run fuzz tests (quick mode)
        run: |
          # Run fuzz tests for 30 seconds each (quick CI mode)
          timeout 30 cargo fuzz run fuzz_proof_validation --release --fuzz-dir pallets/x3-atomic-kernel/fuzz || true
          timeout 30 cargo fuzz run bridge_proof_verify --release --fuzz-dir crates/x3-proof/fuzz || true
          timeout 30 cargo fuzz run intent_decode --release --fuzz-dir crates/x3-intent/fuzz || true
          timeout 30 cargo fuzz run router_transfer_validation --release --fuzz-dir pallets/x3-cross-vm-router/fuzz || true
          timeout 30 cargo fuzz run settlement_intent_validation --release --fuzz-dir pallets/x3-settlement-engine/fuzz || true
        continue-on-error: true

  multi-node-smoke:
    name: Multi-Node Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Run multi-node consensus tests
        run: cargo test --test multi_node_consensus_test --release
        timeout-minutes: 30

  rpc-compatibility:
    name: RPC Compatibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Build test binary
        run: cargo build -p x3-chain-node --release
      - name: Run RPC compatibility smoke test
        run: |
          # Start node in background
          ./target/release/x3-chain-node --chain dev --rpc-port 9933 &
          NODE_PID=$!
          sleep 10

          # Test basic RPC calls
          curl -X POST -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"system_chain","params":[],"id":1}' \
            http://localhost:9933

          curl -X POST -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
            http://localhost:9933

          # Cleanup
          kill $NODE_PID || true
        timeout-minutes: 15

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
      - name: Check reproducible build
        run: |
          # Build twice and compare hashes
          cargo build --release --locked
          cp target/release/x3-chain-node target/release/x3-chain-node-1
          rm -rf target/release/deps target/release/build target/release/incremental
          cargo build --release --locked
          cp target/release/x3-chain-node target/release/x3-chain-node-2

          # Compare binaries
          if cmp target/release/x3-chain-node-1 target/release/x3-chain-node-2; then
            echo "✅ Builds are reproducible"
          else
            echo "❌ Builds are not reproducible"
            exit 1
          fi

          # Generate checksums
          sha256sum target/release/x3-chain-node > target/release/x3-chain-node.sha256

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate SBOM
        run: cargo cyclonedx --output-format json --output-file sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  chain-spec-validation:
    name: Validate Chain Spec Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Build chain spec validation tool
        run: cargo build -p x3-chain-node --release
      - name: Validate chain specs
        run: |
          # Check if chain spec files exist and are valid JSON
          find . -name "*chain-spec*.json" -type f | while read -r spec_file; do
            echo "Validating $spec_file..."
            if jq empty "$spec_file" 2>/dev/null; then
              echo "✅ $spec_file is valid JSON"
            else
              echo "❌ $spec_file is invalid JSON"
              exit 1
            fi
          done

          # Test chain spec generation
          ./target/release/x3-chain-node build-spec --chain dev > /tmp/dev-chain-spec.json
          if jq empty /tmp/dev-chain-spec.json 2>/dev/null; then
            echo "✅ Chain spec generation works"
          else
            echo "❌ Chain spec generation failed"
            exit 1
          fi

  advanced-fragile-loom:
    name: Advanced Fragile - Loom
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install nightly for fragile lane
        run: rustup toolchain install nightly --profile minimal
      - name: Loom runtime interleavings
        run: |
          LOOM_MAX_PREEMPTIONS=3 cargo +nightly test -p x3-gateway \
            --test loom_mempool_concurrency --features loom-tests -- --nocapture

  advanced-fragile-shuttle:
    name: Advanced Fragile - Shuttle
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install nightly for fragile lane
        run: rustup toolchain install nightly --profile minimal
      - name: Shuttle randomized scheduling
        run: |
          cargo +nightly test -p x3-gateway --test shuttle_validator_async shuttle_ -- --nocapture

  advanced-fragile-kani:
    name: Advanced Fragile - Kani
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.89.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install Kani
        run: cargo install kani-verifier || true
      - name: Kani harnesses
        run: |
          cargo +stable kani --harness prove_fee_no_overflow
          cargo +stable kani --harness prove_accounting_conserved

  advanced-fragile-miri:
    name: Advanced Fragile - Miri
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install Miri component
        run: rustup component add miri
      - name: Miri UB check (x3-proof)
        run: |
          MIRIFLAGS="-Zmiri-strict-provenance" cargo +nightly miri test -p x3-proof --lib

  advanced-fragile-sanitizers:
    name: Advanced Fragile - Sanitizers
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_fragile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Memory sanitizer compile
        run: |
          RUSTFLAGS="-Zsanitizer=memory" cargo +nightly build -p x3-proof --lib --target x86_64-unknown-linux-gnu
      - name: Thread sanitizer compile
        run: |
          RUSTFLAGS="-Zsanitizer=thread" cargo +nightly test --tests -p x3-gateway --target x86_64-unknown-linux-gnu --no-run
