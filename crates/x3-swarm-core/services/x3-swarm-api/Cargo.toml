[package]
name = "x3-swarm-api"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["X3 Team"]
description = "X3 swarm API service for agent orchestration"

[dependencies]
axum = { version = "0.7", features = ["macros"] }
axum-server = "0.8"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
