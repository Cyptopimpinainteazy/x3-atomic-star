name: Phase 5 - Jury Blockchain Anchoring CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature/**
    paths:
      - 'pallets/x3-jury-anchor/**'
      - 'swarm/jury/**'
      - 'packages/blockchain-adapter/**'
      - 'tests/test_jury_anchoring.py'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # Rust pallet build and test
  rust-build:
    name: Rust Pallet Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: pallets/x3-jury-anchor

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: pallets/x3-jury-anchor

      - name: Build pallet
        run: cargo build --release
        working-directory: pallets/x3-jury-anchor

      - name: Run pallet tests
        run: cargo test --release
        working-directory: pallets/x3-jury-anchor

  # Python service tests
  python-test:
    name: Python Service Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: jury_test
          POSTGRES_USER: jury_admin
          POSTGRES_PASSWORD: jury_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 swarm/jury/anchorer.py --max-line-length=100

      - name: Type check with mypy
        run: mypy swarm/jury/anchorer.py

      - name: Run pytest tests
        env:
          DB_HOST: localhost
          DB_USER: jury_admin
          DB_PASSWORD: jury_password
        run: pytest tests/test_jury_anchoring.py -v --cov=swarm.jury --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  # TypeScript / JavaScript tests
  typescript-test:
    name: TypeScript Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/blockchain-adapter

      - name: Lint
        run: npm run lint
        working-directory: packages/blockchain-adapter

      - name: Type check
        run: npm run type-check
        working-directory: packages/blockchain-adapter

      - name: Run tests
        run: npm test
        working-directory: packages/blockchain-adapter

      - name: Build
        run: npm run build
        working-directory: packages/blockchain-adapter

  # Integration tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-build, python-test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: jury_test
          POSTGRES_USER: jury_admin
          POSTGRES_PASSWORD: jury_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_USER: jury_admin
          DB_PASSWORD: jury_password
          RPC_URL: http://localhost:9944
        run: pytest tests/test_jury_anchoring.py::TestJuryAnchoringEndToEnd -v

  # Security checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Build Docker images
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [rust-build, python-test, typescript-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push blockchain image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.blockchain
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/blockchain:latest
            ghcr.io/${{ github.repository }}/blockchain:${{ github.sha }}

      - name: Build and push jury-anchorer image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.jury-anchorer
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/jury-anchorer:latest
            ghcr.io/${{ github.repository }}/jury-anchorer:${{ github.sha }}

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [rust-build, python-test, typescript-test, security, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: http://staging-jury.x3.io
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to staging
        run: ./scripts/deploy-phase5.sh staging cpu

      - name: Run health checks
        run: ./scripts/health-check-phase5.sh

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Phase 5 deployed to staging'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
