name: Production Testnet Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging
          - production

env:
  CARGO_TERM_COLOR: always
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/x3-chain

jobs:
  # ============================================================================
  # Security Scanning & Vulnerability Assessment
  # ============================================================================
  security-scan:
    name: Security Audit & Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --json > cargo-audit-report.json

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: cargo-audit-report.json

      - name: Run cargo clippy security lints
        run: |
          cargo clippy --all-targets --all-features -- \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::todo \
            -W clippy::unimplemented \
            -D warnings

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (TS SDK)
        working-directory: packages/ts-sdk
        run: npm ci

      - name: Run npm audit (TS SDK)
        working-directory: packages/ts-sdk
        run: npm audit --json > ../../npm-audit-report.json

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Build & Test
  # ============================================================================
  build-and-test:
    name: Build & Test All Components
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust tests
        run: |
          cargo test --workspace --release --all-features
          ./RUN_ALL_TESTS.sh

      - name: Build node binary
        run: cargo build --release --locked -p x3-chain-node

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build TypeScript SDK
        working-directory: packages/ts-sdk
        run: |
          npm ci
          npm run build
          npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/x3-chain-node
            packages/ts-sdk/dist

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  build-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - node
          - rpc-gateway
          - analytics
          - explorer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-${{ matrix.component }}.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-${{ matrix.component }}.sarif'

  # ============================================================================
  # Deploy to Testnet
  # ============================================================================
  deploy-testnet:
    name: Deploy to Production Testnet
    runs-on: ubuntu-latest
    needs: build-docker-images
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testnet
      url: https://rpc.testnet.x3-chain.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl context
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl config use-context x3-testnet

      - name: Update Kubernetes secrets
        run: |
          kubectl create secret generic postgres-credentials \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --namespace x3-chain \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          # Update image tags in deployment
          sed -i "s|x3-chain/node:latest|${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-node:${{ github.sha }}|g" deployment/kubernetes/production-deployment.yaml
          sed -i "s|x3-chain/rpc-gateway:latest|${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-rpc-gateway:${{ github.sha }}|g" deployment/kubernetes/production-deployment.yaml
          sed -i "s|x3-chain/analytics:latest|${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-analytics:${{ github.sha }}|g" deployment/kubernetes/production-deployment.yaml
          sed -i "s|x3-chain/explorer:latest|${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-explorer:${{ github.sha }}|g" deployment/kubernetes/production-deployment.yaml

          # Deploy Canary release for Explorer (Helm)
          helm upgrade --install explorer-canary deployment/helm/explorer \
            --namespace x3-chain --create-namespace \
            --set canary.enabled=true \
            --set canary.image.tag=${{ github.sha }} \
            --set ingress.host=canary.explorer.testnet.x3-chain.io \
            --wait --timeout 120s

          # Run quick canary smoke-test (port-forward canary service)
          kubectl port-forward -n x3-chain svc/explorer-canary 3001:3000 &
          PF_PID=$!; sleep 3
          if ! curl -fsS http://localhost:3001/; then
            echo "Canary smoke test FAILED - uninstalling canary and aborting"
            kill $PF_PID || true
            helm uninstall explorer-canary -n x3-chain || true
            exit 1
          fi
          kill $PF_PID || true

          echo "Canary smoke test passed — proceeding with production deployment"

          kubectl apply -f deployment/kubernetes/production-deployment.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/bootnode -n x3-chain --timeout=5m
          kubectl rollout status statefulset/validator -n x3-chain --timeout=5m
          kubectl rollout status deployment/analytics -n x3-chain --timeout=5m
          kubectl rollout status deployment/explorer -n x3-chain --timeout=3m

      - name: Install Helm (CI)
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy Explorer (Helm)
        run: |
          # Use Helm chart in repo to deploy Explorer; override image built earlier
          helm upgrade --install explorer deployment/helm/explorer \
            --namespace x3-chain --create-namespace \
            --set image.repository=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-explorer \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 120s

      - name: Promote canary (remove canary release)
        run: |
          # Main release now serving the validated image; remove canary to stop routing
          helm uninstall explorer-canary -n x3-chain || true

      - name: Verify deployment
        run: |
          kubectl get pods -n x3-chain
          kubectl get services -n x3-chain
          kubectl get ingress -n x3-chain

      - name: Run smoke tests (RPC, analytics, explorer) and rollback on failure
        run: |
          set -euo pipefail

          # Test RPC endpoints
          curl -f https://rpc.testnet.x3-chain.io/rpc \
            -H "Content-Type: application/json" \
            -d '{"id":1, "jsonrpc":"2.0", "method":"system_health"}'

          # Test analytics service
          kubectl port-forward -n x3-chain svc/analytics 8080:8080 &
          sleep 5
          curl -f http://localhost:8080/health

          # Test Explorer UI and rollback on failure
          if ! curl -fsS --max-time 10 https://{{ env.EXPLORER_HOST:-explorer.testnet.x3-chain.io }}/ ; then
            echo "Explorer smoke test FAILED — rolling back Helm release"
            helm rollback explorer --namespace x3-chain || true
            exit 1
          fi

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-testnet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Playwright
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Run wallet integration tests
        run: |
          cd apps/e2e
          npm ci
          npm run test:metamask
          npm run test:phantom

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: apps/e2e/test-results

  # ============================================================================
  # Post-Deployment Validation
  # ============================================================================
  post-deploy-validation:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run health checks
        run: |
          chmod +x deployment/scripts/health-check.sh
          deployment/scripts/health-check.sh https://rpc.testnet.x3-chain.io

      - name: Verify block production
        run: |
          # Check that blocks are being produced
          BLOCK_1=$(curl -s https://rpc.testnet.x3-chain.io/rpc \
            -H "Content-Type: application/json" \
            -d '{"id":1, "jsonrpc":"2.0", "method":"chain_getBlock"}' \
            | jq -r '.result.block.header.number')
          
          sleep 12  # Wait for 2 blocks (6s block time)
          
          BLOCK_2=$(curl -s https://rpc.testnet.x3-chain.io/rpc \
            -H "Content-Type: application/json" \
            -d '{"id":1, "jsonrpc":"2.0", "method":"chain_getBlock"}' \
            | jq -r '.result.block.header.number')
          
          if [ "$BLOCK_2" -le "$BLOCK_1" ]; then
            echo "Error: Blocks not being produced"
            exit 1
          fi
          
          echo "✓ Block production verified: $BLOCK_1 -> $BLOCK_2"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Production testnet deployment successful!"
          echo "RPC Endpoint: https://rpc.testnet.x3-chain.io"
          echo "Explorer: https://explorer.testnet.x3-chain.io"
          echo "Faucet: https://faucet.testnet.x3-chain.io"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed - check logs above"
          exit 1
