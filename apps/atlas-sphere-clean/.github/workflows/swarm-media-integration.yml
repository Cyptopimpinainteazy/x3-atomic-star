name: swarm-media-integration

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'crates/swarm-media/**'
      - 'alembic/**'
      - '.github/workflows/**'
  push:
    branches: [ main, e2e-kms-regtest ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: x3_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.88.0
          profile: minimal
          override: true

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/x3_test" >> $GITHUB_ENV

      - name: Run Alembic migrations (if present)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          if [ -f alembic.ini ]; then
            # Ensure required logger sections are present to avoid fileConfig KeyError
            python - <<'PY'
          from configparser import ConfigParser
          import sys
          cfg = ConfigParser()
          if not cfg.read('alembic.ini'):
              print('alembic.ini not found or unreadable')
              sys.exit(1)
          missing = [s for s in ('logger_sqlalchemy','logger_alembic') if s not in cfg.sections()]
          if missing:
              print('Missing logger sections in alembic.ini:', missing)
              sys.exit(1)
          print('alembic.ini logger sections OK')
          PY

            pip install alembic psycopg2-binary

            # Quick sanity check: ensure Alembic runtime deps import correctly
            python - <<'PY'
          import sys
          try:
              import sqlalchemy
              import psycopg2
          except Exception as e:
              print("Dependency import failed:", e)
              sys.exit(1)
          print("Alembic dependencies imported successfully")
          PY

            # Use 'heads' (plural) to handle multiple migration branches
            alembic upgrade heads
          else
            echo "No alembic.ini found, creating tables via SQL in test setup"
          fi

      - name: Verify Alembic idempotency (upgrade heads again)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          if [ -f alembic.ini ]; then
            echo "Running Alembic idempotency check: second upgrade"
            alembic upgrade heads
            echo "Alembic idempotency check passed"
          else
            echo "No alembic.ini found, skipping idempotency check"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |-
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run swarm-media tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          set -e
          cd crates/swarm-media
          cargo test --lib -- --nocapture

  alembic-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Fetch base branch
        run: git fetch origin main --depth=1

      - name: Run Alembic migration lint
        run: |
          python3 scripts/validate_alembic.py
        shell: bash

  alembic-roundtrip-nonblocking:
    if: >
      github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'run-alembic-roundtrip')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/x3_test" >> $GITHUB_ENV

      - name: Install Alembic and deps (non-blocking)
        continue-on-error: true
        run: python -m pip install --user alembic psycopg2-binary

      - name: Alembic roundtrip downgrade->upgrade (non-blocking)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        continue-on-error: true
        run: |
          if [ -f alembic.ini ]; then
            echo "Running labeled non-blocking Alembic roundtrip: downgrade base -> upgrade heads"
            alembic downgrade base || true
            alembic upgrade heads || true
            echo "Non-blocking Alembic roundtrip completed (errors ignored)"
          else
            echo "No alembic.ini found, skipping non-blocking roundtrip"
          fi
