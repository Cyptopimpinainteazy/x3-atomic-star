# Combined E2E workflow
on:
  push:
    paths:
      - '.github/workflows/swarm-dashboard-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/swarm-dashboard/package-lock.json'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: apps/swarm-dashboard/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/swarm-dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/swarm-dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        working-directory: ./swarm-dashboard
        run: |
          npm ci --legacy-peer-deps || true
          npm install --no-audit --no-fund

      - name: Run type checking
        working-directory: ./swarm-dashboard
        run: npm run type-check || true

      - name: Install Playwright Browsers
        working-directory: ./swarm-dashboard
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./swarm-dashboard
        run: npm run e2e:test || true

      - name: Check Axe violations and comment on PR
        id: check_axe
        if: always()
        run: |
          echo "Checking for axe violations artifact..."
          if [ -f apps/swarm-dashboard/e2e/axe-violations.json ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            summary=$(jq -r '.[] | "- \(.id) (impact: \(.impact)) — \(.nodes|length) nodes"' apps/swarm-dashboard/e2e/axe-violations.json | sed ':a;N;$!ba;s/\n/\\n/g')
            body="Axe accessibility check reported violations on this run:\n\n${summary}\n\nFull JSON is available as a workflow artifact (axe-violations.json)."
            echo "Posting comment to PR #${{ github.event.pull_request.number }}"
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments -f body="$body"
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload axe violations artifact
        if: steps.check_axe.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: axe-violations
          path: apps/swarm-dashboard/e2e/axe-violations.json

      - name: Create triage issue for Axe violations (if none exists)
        if: steps.check_axe.outputs.found == 'true'
        env:
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          ASSIGNEE: ${{ vars.AXE_TRIAGE_ASSIGNEE }}
        run: |
          echo "Preparing to create triage issue for Axe violations..."
          TITLE="A11y: Axe accessibility violations detected (PR #${PR})"
          hits=$(gh api search/issues -f q="repo:${REPO} is:issue is:open in:title \"${TITLE}\"" --jq '.total_count')
          echo "Found existing issues: $hits"
          if [ "$hits" -eq 0 ]; then
            summary=$(jq -r '.[] | "- \(.id) (impact: \(.impact)) — \(.nodes|length) nodes"' apps/swarm-dashboard/e2e/axe-violations.json | sed ':a;N;$!ba;s/\n/\\n/g')
            BODY="Axe accessibility check found violations on PR #${PR}:\n\n${summary}\n\nSee attached artifact 'axe-violations.json' for full details."
            if [ -n "${ASSIGNEE}" ]; then
              ISSUE=$(gh api repos/${REPO}/issues -f title="$TITLE" -f body="$BODY" -f labels='["accessibility","triage"]' -f assignees='["'"${ASSIGNEE}"'"']' --jq '.number')
            else
              ISSUE=$(gh api repos/${REPO}/issues -f title="$TITLE" -f body="$BODY" -f labels='["accessibility","triage"]' --jq '.number')
            fi
            echo "Opened issue #${ISSUE}"
            gh api repos/${REPO}/issues/${PR}/comments -f body="Opened triage issue #${ISSUE} for accessibility violations: https://github.com/${REPO}/issues/${ISSUE}"
          else
            echo "Issue already exists, skipping creation."
          fi

# Also include a simpler 'test' job from other branch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install swarm-dashboard deps
        working-directory: ./swarm-dashboard
        run: |
          npm ci
          npx playwright install --with-deps

      - name: TypeScript check
        working-directory: ./swarm-dashboard
        run: npm run tsc

      - name: Run unit tests
        working-directory: ./swarm-dashboard
        run: npm test --if-present

      - name: Run Playwright e2e
        working-directory: ./swarm-dashboard
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'false'
        run: npx playwright test --config e2e/playwright.config.ts
