name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - copilot/**
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  prod-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (prod-faithful defaults)
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo tests (release, prod-faithful defaults)
        run: cargo test --workspace --release

      - name: Run extended test suite
        run: |
          chmod +x ./RUN_ALL_TESTS.sh
          ./RUN_ALL_TESTS.sh

      - name: Build runtime WASM (no_std compatibility)
        run: cargo build -p x3-chain-runtime --release --target wasm32-unknown-unknown --no-default-features

  feature-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy (all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo tests (release, all features)
        run: cargo test --workspace --release --all-features

  critical-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install coverage tools
        run: cargo install cargo-tarpaulin --locked --force

      - name: Run tarpaulin on critical crates
        run: |
          set -euo pipefail
          mkdir -p target/coverage
          for crate in x3-dex x3-flashloan x3-swap-router gpu-swarm; do
            out_dir="target/coverage/${crate}"
            mkdir -p "${out_dir}"
            cargo tarpaulin -p "${crate}" --out Lcov --output-dir "${out_dir}" --timeout 240
          done

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: critical-path-coverage
          path: target/coverage

      - name: Run x3-enforce (coverage guard)
        env:
          X3_ENFORCE_COVERAGE: "1"
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base_ref="${BASE_REF:-origin/main}"
          python3 scripts/x3_enforce.py --mode ci --base "$base_ref" --head "${GITHUB_SHA}"

  swarm-dep-guard:
    name: Guard – no new swarm/gpu-swarm deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect new swarm dependencies
        # Fail if any Cargo.toml introduces a *new* dependency on gpu-swarm or pallet-swarm
        # beyond the known legacy users that are being migrated away.
        # Allowed existing users (to be removed as migration completes):
        #   crates/quantum-swarm, crates/cross-chain-position-manager, tests/e2e, runtime
        run: |
          set -euo pipefail
          ALLOWED_PATHS=(
            "crates/quantum-swarm/Cargo.toml"
            "crates/cross-chain-position-manager/Cargo.toml"
            "tests/e2e/Cargo.toml"
            "runtime/Cargo.toml"
            "x3-swarm-orchestra/arbitrage/quantum-swarm/Cargo.toml"
          )

          violations=0
          while IFS= read -r toml_file; do
            # Check if this file has a gpu-swarm or pallet-swarm dependency
            if grep -qE '(gpu-swarm|pallet-swarm)' "$toml_file"; then
              # Check if it's on the allowed list
              allowed=false
              for allowed_path in "${ALLOWED_PATHS[@]}"; do
                if [[ "$toml_file" == *"$allowed_path"* ]]; then
                  allowed=true
                  break
                fi
              done
              if [[ "$allowed" == "false" ]]; then
                echo "::error file=$toml_file::Forbidden dependency on deprecated gpu-swarm or pallet-swarm. See docs/openspec/changes/refactor-swarm-legacy/ for migration guidance."
                violations=$((violations + 1))
              fi
            fi
          done < <(find . -name "Cargo.toml" \
            -not -path "./crates/gpu-swarm/*" \
            -not -path "./pallets/swarm/*" \
            -not -path "./target/*" \
            -not -path "./.git/*")

          if [[ "$violations" -gt 0 ]]; then
            echo ""
            echo "Found $violations Cargo.toml file(s) with forbidden swarm dependencies."
            exit 1
          fi
          echo "✅ No new swarm dependencies detected."
