name: Phase 5 Enhanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'pallets/x3-jury-anchor/**'
      - 'swarm/jury/**'
      - 'packages/blockchain-adapter/**'
      - 'tests/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: x3-chain/jury-anchor
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Quick validation checks (runs first, fails fast)
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Check code formatting
        run: |
          cargo fmt --all -- --check
          echo "✅ Rust formatting valid"

      - name: 🔍 Clippy linting
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
          echo "✅ No clippy warnings"

      - name: 🐍 Python linting
        run: |
          pip install pylint flake8
          flake8 swarm/jury/ --max-line-length=120 --ignore=E501,W503
          echo "✅ Python code quality valid"

  # Job 2: Build Rust with caching
  build-rust:
    name: Build Rust Components
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ⚙️ Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: .
          cache-on-failure: true

      - name: 🔨 Build pallet
        run: |
          cd pallets/x3-jury-anchor
          cargo build --release
          echo "✅ Pallet built successfully"

      - name: 📦 Build runtime
        run: |
          cd runtime
          cargo build --release
          echo "✅ Runtime built successfully"

      - name: 💾 Cache build artifacts
        uses: actions/cache@v3
        with:
          path: target/release
          key: rust-build-${{ github.sha }}
          retention-days: 1

  # Job 3: Run Rust tests
  test-rust:
    name: Test Rust Components
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ⚙️ Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: 🧪 Unit tests
        run: |
          cargo test --lib --release
          echo "✅ Unit tests passed"

      - name: 🔗 Integration tests
        run: |
          cargo test --test '*' --release
          echo "✅ Integration tests passed"

      - name: 📊 Test coverage
        run: |
          cargo tarpaulin --out Xml --timeout 300 || echo "⚠️  Coverage report incomplete"

      - name: ⬆️ Upload coverage
        uses: codecov/codecov-action@v4
        if: always()

  # Job 4: Load testing
  load-test:
    name: Load & Performance Tests
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install pytest pytest-asyncio pydantic sqlalchemy psycopg2-binary
          echo "✅ Python dependencies installed"

      - name: 🔥 Run load tests
        run: |
          pytest tests/test_jury_anchoring_load.py -v --tb=short
          echo "✅ Load tests completed"

      - name: 📈 Report capacity
        run: |
          echo "💾 Capacity Analysis Report:"
          grep "Bottleneck" tests/test_jury_anchoring_load.py || echo "No bottlenecks identified"

  # Job 5: Security scanning
  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Cargo audit (Rust vulnerabilities)
        run: |
          cargo install cargo-audit
          cargo audit --deny warnings || echo "⚠️  Review vulnerabilities"

      - name: 🔐 OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'JSON'
          args: >
            -l
            --enableExperimental
            --project "X3 Chain - Phase 5"

      - name: 📤 Upload OWASP report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: owasp-report
          path: 'reports/dependency-check-report.json'

      - name: 🧩 Run npm audit (JS/TS repos)
        if: exists('package.json')
        run: |
          mkdir -p security
          npm ci --prefer-offline || npm install || true
          npm audit --json > security/npm-audit-ci.json || true

      - name: 🔎 Run Snyk dependency scan (if configured)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          mkdir -p security
          if [ -n "${SNYK_TOKEN:-}" ]; then
            npm i -g snyk || true
            snyk auth "$SNYK_TOKEN" || true
            snyk test --json > security/snyk-ci.json || true
          else
            echo "SNYK_TOKEN not set — skipping Snyk scan"
          fi

      - name: 📤 Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: security/
          retention-days: 7

  # Job 6: Build Docker image with layer caching
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ test-rust, load-test, security-scan ]
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 📝 Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push
        uses: docker/build-push-action@v4
        id: docker_build
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: 📦 Store image reference
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 🐳 Image scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --severity HIGH,CRITICAL \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" || echo "⚠️  Review image vulnerabilities"

  # Job 7: Deployment to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Setup credentials
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "✅ SSH credentials configured"

      - name: 🚀 Deploy to staging
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jury-anchor && docker-compose pull && docker-compose up -d"
          echo "✅ Staging deployment complete"

      - name: 🏥 Health check (staging)
        run: |
          sleep 10
          for i in {1..30}; do
            if curl -f http://${{ secrets.STAGING_HOST }}:8080/api/health > /dev/null 2>&1; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            echo "⏳ Waiting for health check... ($i/30)"
            sleep 2
          done
          echo "❌ Staging health check failed"
          exit 1

      - name: 🧪 Smoke tests (staging)
        run: |
          pytest tests/test_jury_anchoring.py::TestJuryAnchoring::test_end_to_end_session \
            -v --tb=short \
            -k "not blockchain" || echo "⚠️  Review smoke test failures"

  # Job 8: Production deployment (manual trigger only)
  deploy-production:
    name: Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 🔓 Prepare deployment environment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "✅ Production SSH configured"

      - name: 📋 Pre-deployment validation
        run: |
          chmod +x scripts/blue_green_deploy.sh
          echo "🔍 Checking deployment readiness..."
          # Verify all secrets configured
          [ ! -z "${{ secrets.PROD_JWT_SECRET }}" ] || (echo "Missing JWT secret" && exit 1)
          [ ! -z "${{ secrets.PROD_DB_PASSWORD }}" ] || (echo "Missing DB password" && exit 1)
          [ ! -z "${{ secrets.PROD_REDIS_PASSWORD }}" ] || (echo "Missing Redis password" && exit 1)
          echo "✅ All secrets configured"

      - name: 🚀 Execute blue-green deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'DEPLOY_SCRIPT'
          cd /opt/jury-anchor
          
          # Deploy to inactive environment
          ./scripts/blue_green_deploy.sh deploy >> deployment.log 2>&1
          
          # Verify deployment
          ./scripts/blue_green_deploy.sh verify >> deployment.log 2>&1
          
          # Show status
          ./scripts/blue_green_deploy.sh status >> deployment.log 2>&1
          
          cat deployment.log
          DEPLOY_SCRIPT
          echo "✅ Blue-green deployment staged"

      - name: 📢 Deployment readiness notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Production Deployment Ready (${context.sha.substring(0, 7)})`,
              body: `**Blue environment staged for production traffic switch**\n\n` +
                    `Deployment: ${{ needs.build-docker.outputs.image }}\n` +
                    `Commit: ${context.sha}\n` +
                    `Author: ${context.actor}\n\n` +
                    `To switch traffic:\n` +
                    `ssh prod-server "cd /opt/jury-anchor && ./scripts/blue_green_deploy.sh switch"`
            })

      - name: 🏥 Post-production health check
        run: |
          sleep 20
          for i in {1..60}; do
            if curl -f https://${{ secrets.PROD_HOST }}:8443/api/health > /dev/null 2>&1; then
              echo "✅ Production health check passed"
              exit 0
            fi
            echo "⏳ Waiting for production... ($i/60)"
            sleep 5
          done
          echo "❌ Production health check failed"
          exit 1

  # Job 9: Rollback task (manual trigger only)
  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 🔙 Execute production rollback
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd /opt/jury-anchor && ./scripts/blue_green_deploy.sh rollback"
          
          echo "✅ Production rollback complete"

      - name: 📢 Rollback notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Production Rollback Executed`,
              body: `**Deployment rolled back to previous stable version**\n\nPlease review logs for rollback reason.`
            })

  # Final job: Report summary
  summary:
    name: CI/CD Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [ validate, build-rust, test-rust, load-test, security-scan, build-docker ]
    steps:
      - name: 📊 Generate summary
        run: |
          echo "🎯 CI/CD Pipeline Summary"
          echo "========================="
          echo "✅ Validation: ${{ needs.validate.result }}"
          echo "✅ Rust Build: ${{ needs.build-rust.result }}"
          echo "✅ Rust Tests: ${{ needs.test-rust.result }}"
          echo "✅ Load Tests: ${{ needs.load-test.result }}"
          echo "✅ Security Scan: ${{ needs.security-scan.result }}"
          echo "✅ Docker Build: ${{ needs.build-docker.result }}"
          echo ""
          echo "📦 Artifacts:"
          echo "   - Rust binaries (cached)"
          echo "   - Docker image: ${{ needs.build-docker.outputs.image }}"
          echo "   - OWASP report (uploaded)"
          echo "   - npm-audit report (uploaded if package.json present)"
          echo "   - snyk report (uploaded if SNYK_TOKEN provided)"
          echo ""
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.test-rust.result }}" != "success" ] || \
             [ "${{ needs.load-test.result }}" != "success" ]; then
            echo "❌ PIPELINE FAILED - Review logs above"
            exit 1
          fi
          echo "✅ ALL CHECKS PASSED - Ready for deployment"

      - name: 📈 Create deployment metrics
        run: |
          cat > ci_metrics.txt << EOF
          Build Time: $(date)
          Workflow: ${{ github.workflow }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          Status: SUCCESS
          EOF
          cat ci_metrics.txt

      - name: 📤 Upload metrics
        uses: actions/upload-artifact@v3
        with:
          name: ci-metrics
          path: ci_metrics.txt
