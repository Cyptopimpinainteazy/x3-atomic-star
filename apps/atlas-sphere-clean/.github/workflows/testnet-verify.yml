name: Testnet Verify (Local 7 Validators)

on:
  workflow_dispatch:
    inputs:
      run_load:
        description: "Run load baseline during verification"
        required: false
        default: "false"
      run_multiprocess:
        description: "Use multiprocess load baseline"
        required: false
        default: "false"
      load_duration_sec:
        description: "Load test duration in seconds"
        required: false
        default: "1200"
      min_finalized_tps:
        description: "Minimum finalized TPS threshold"
        required: false
        default: "0"
      max_error_rate:
        description: "Maximum error rate threshold"
        required: false
        default: "0.01"
  schedule:
    - cron: "*/5 * * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-local:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install subkey (required by local validator script)
        run: |
          cargo install --locked --git https://github.com/paritytech/polkadot-sdk --rev e57fad1b8e70be8942733d58137dbbcf9636bfca --bin subkey
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build x3-chain-node
        run: cargo build -p x3-chain-node --release

      - name: Start local 7-validator testnet
        run: |
          BASE_DIR=/tmp/x3-testnet-ci \
          LOG_DIR=/tmp/x3-testnet-ci-logs \
          COUNT=7 \
          scripts/testnet/run-7-validators-local.sh --wipe --base-dir /tmp/x3-testnet-ci --log-dir /tmp/x3-testnet-ci-logs

      - name: Run testnet verification
        env:
          RUN_LOAD: ${{ inputs.run_load }}
          RUN_MULTIPROCESS: ${{ inputs.run_multiprocess }}
          LOAD_DURATION_SEC: ${{ inputs.load_duration_sec }}
          MIN_FINALIZED_TPS: ${{ inputs.min_finalized_tps }}
          MAX_ERROR_RATE: ${{ inputs.max_error_rate }}
        run: make testnet-verify

      - name: Stop local testnet
        if: always()
        run: |
          BASE_DIR=/tmp/x3-testnet-ci \
          LOG_DIR=/tmp/x3-testnet-ci-logs \
          scripts/testnet/run-7-validators-local.sh --wipe --base-dir /tmp/x3-testnet-ci --log-dir /tmp/x3-testnet-ci-logs
