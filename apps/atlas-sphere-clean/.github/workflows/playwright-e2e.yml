name: Playwright E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main, chore/**, feat/** ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: |
          cd swarm-dashboard
          npm ci
      - name: Run unit tests (Jest)
        working-directory: swarm-dashboard
        run: |
          npm run test:ci
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-dashboard-coverage
          path: |
            apps/swarm-dashboard/coverage/**
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/swarm-dashboard/coverage/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: |
          cd swarm-dashboard
          npm ci
      - name: Install Playwright browsers
        working-directory: swarm-dashboard
        run: |
          npx playwright install --with-deps
      - name: Run Playwright tests
        working-directory: swarm-dashboard
        run: |
          npm run e2e:test
        continue-on-error: true
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-dashboard-test-results
          path: |
            apps/swarm-dashboard/e2e/test-results/**
            apps/swarm-dashboard/e2e/axe-violations.json
            apps/swarm-dashboard/e2e/test-results/*.zip
            apps/swarm-dashboard/e2e/test-results/*.tar
            apps/swarm-dashboard/e2e/test-results/junit.xml
      - name: Post test summary to PR
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        continue-on-error: true
        with:
          name: Playwright E2E
          path: apps/swarm-dashboard/e2e/test-results/junit.xml
          reporter: junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}