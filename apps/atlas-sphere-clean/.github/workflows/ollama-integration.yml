name: Ollama Integration Tests

on:
  workflow_dispatch:

env:
  OLLAMA_URL: http://localhost:11434

jobs:
  ollama-integration:
    name: Run Ollama streaming E2E tests (manual trigger only)
    runs-on: ubuntu-latest
    if: ${{ secrets.RUN_OLLAMA_INTEGRATION == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Ollama (docker)
        run: |
          docker pull ollama/ollama:latest
          docker run -d --rm --name ollama-test -p 11434:11434 ollama/ollama:latest

      - name: Wait for Ollama
        run: |
          for i in $(seq 1 60); do
            if curl -sS --max-time 2 http://localhost:11434/api/models >/dev/null 2>&1; then
              echo "Ollama ready"
              exit 0
            fi
            sleep 2
          done
          echo "Ollama did not become ready" >&2
          exit 1

      - name: (Optional) Pull test model
        run: |
          if [ -n "${{ secrets.OLLAMA_PULL_TEST_MODEL }}" ]; then
            echo "Pulling model: ${{ secrets.OLLAMA_PULL_TEST_MODEL }}"
            docker exec ollama-test ollama pull "${{ secrets.OLLAMA_PULL_TEST_MODEL }}"
          else
            echo "No OLLAMA_PULL_TEST_MODEL secret set; skipping model pull"
          fi

      - name: Run streaming E2E tests
        env:
          OLLAMA_URL: http://localhost:11434
          OLLAMA_STREAM_TEST_MODEL: ${{ secrets.OLLAMA_PULL_TEST_MODEL }}
        run: |
          python -m pip install -r requirements-dev.txt || true
          PYTHONPATH=. pytest -q swarm/tests/test_ollama_streaming.py -q

      - name: Teardown Ollama
        if: always()
        run: |
          docker stop ollama-test || true
