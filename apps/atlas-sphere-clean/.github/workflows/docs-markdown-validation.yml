name: Docs Markdown Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  markdown-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install docs tooling
        run: |
          npm install --no-save --no-audit --no-fund --legacy-peer-deps remark-cli remark-validate-links runmd
          python -m pip install --upgrade pip
          python -m pip install mdrefcheck mktestdocs

      - name: Validate markdown links (remark)
        run: npm run docs:check:remark-links

      - name: Validate markdown references (mdrefcheck)
        run: npm run docs:check:mdrefs

      - name: Validate python markdown examples
        run: npm run docs:check:python-examples

      - name: Validate runmd code blocks
        run: npm run docs:check:runmd
