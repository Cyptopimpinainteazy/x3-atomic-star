name: E2E Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  e2e-integration-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    
    timeout-minutes: 90  # Extended timeout for complex dependencies
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        components: rustfmt, clippy
    
    - name: Install wasm-bindgen-cli
      run: |
        cargo install wasm-bindgen-cli --version 0.2.92
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libssl-dev \
          protobuf-compiler \
          protobuf-c-compiler \
          librocksdb-dev \
          libsnappy-dev \
          libudev-dev \
          clang \
          cmake \
          ninja-build
    
    - name: Verify workspace members
      run: |
        cargo check --workspace --all-targets
        echo "✅ Workspace validation successful"
    
    - name: Run minimal debug tests (fast feedback)
      run: |
        cd tests/e2e
        cargo test minimal_debug_test --release -- --nocapture
        echo "✅ Minimal debug tests passed"
    
    - name: Compile E2E tests (check only, don't run)
      timeout-minutes: 60
      run: |
        cargo check --package e2e_tests --all-features
        echo "✅ E2E test compilation successful"
    
    - name: Build test dependencies
      timeout-minutes: 45
      run: |
        cargo build --release --package node
        echo "✅ Node binary built successfully"
    
    - name: Start test environment
      run: |
        # Start a background process for the blockchain node
        timeout 300s cargo run --package node --release --bin x3-node -- \
          --dev \
          --rpc-external \
          --rpc-cors all \
          --rpc-methods unsafe \
          --no-telemetry \
          --no-mdns \
          --no-private-ipv4 \
          --listen-addr /ip4/0.0.0.0/tcp/30333 \
          --public-addr /ip4/127.0.0.1/tcp/30333 &
        
        NODE_PID=$!
        echo "NODE_PID=$NODE_PID" >> $GITHUB_ENV
        
        # Wait for node to be ready
        echo "⏳ Waiting for blockchain node to start..."
        for i in {1..60}; do
          if curl -f -s http://localhost:9933/health > /dev/null 2>&1; then
            echo "✅ Blockchain node is ready"
            break
          fi
          sleep 5
        done
        
        if [ $i -eq 60 ]; then
          echo "❌ Blockchain node failed to start"
          exit 1
        fi
    
    - name: Run blockchain integration tests
      timeout-minutes: 20
      run: |
        cd tests/e2e
        cargo test test_blockchain_node_startup_integration --release
        cargo test test_rpc_endpoint_functionality --release
        cargo test test_basic_transaction_flow --release
        echo "✅ Blockchain integration tests passed"
    
    - name: Run protocol-specific tests
      timeout-minutes: 30
      run: |
        cd tests/e2e
        cargo test test_lending_protocol_complete_workflow --release
        cargo test test_ai_swarm_protocol_workflow --release
        cargo test test_evolution_protocol_workflow --release
        cargo test test_cross_chain_position_manager --release
        echo "✅ Protocol tests passed"
    
    - name: Generate test coverage report
      if: success()
      run: |
        # Generate coverage report for integration tests
        cd tests/e2e
        cargo tarpaulin --out xml --output-dir coverage/ \
          --exclude-files utils/ \
          --verbose || true
        echo "📊 Test coverage report generated"
    
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-logs-${{ github.run_number }}
        path: |
          tests/e2e/logs/
          target/debug/deps/e2e_tests-*
          coverage/
        retention-days: 30
    
    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v4
      with:
        file: ./tests/e2e/coverage/cobertura.xml
        flags: e2e-integration
        name: e2e-integration-tests
        fail_ci_if_error: false
    
    - name: Cleanup test environment
      if: always()
      run: |
        if [ -n "$NODE_PID" ]; then
          kill $NODE_PID 2>/dev/null || true
          echo "🧹 Blockchain node stopped"
        fi
        
        # Clean up any remaining processes
        pkill -f "x3-node" || true
        echo "🧹 Test environment cleaned up"
    
    - name: Test Summary
      if: always()
      run: |
        echo "## E2E Integration Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Runner**: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ job.status }}" == "success" ]; then
          echo "- ✅ **All E2E integration tests passed**" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Test coverage**: Generated and uploaded" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 **Ready for production deployment**" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ **Test failures detected**" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 **Check artifacts for detailed logs**" >> $GITHUB_STEP_SUMMARY
        fi

  performance-tests:
    name: Performance & Load Tests
    runs-on: ubuntu-latest
    needs: e2e-integration-tests
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Setup performance test environment
      run: |
        # Install additional tools for performance testing
        sudo apt-get install -y \
          apache2-utils \
          wrk \
          htop \
          iotop
    
    - name: Start blockchain node for performance tests
      run: |
        timeout 600s cargo run --package node --release --bin x3-node -- \
          --dev \
          --rpc-external \
          --rpc-cors all \
          --rpc-methods unsafe \
          --no-telemetry \
          --no-mdns \
          --no-private-ipv4 \
          --listen-addr /ip4/0.0.0.0/tcp/30333 \
          --public-addr /ip4/127.0.0.1/tcp/30333 &
        
        # Wait for node to be ready
        for i in {1..30}; do
          if curl -f -s http://localhost:9933/health > /dev/null 2>&1; then
            echo "✅ Node ready for performance testing"
            break
          fi
          sleep 5
        done
    
    - name: Run performance benchmarks
      timeout-minutes: 30
      run: |
        cd tests/e2e
        cargo test test_network_throughput --release -- --ignored
        cargo test test_concurrent_user_simulation --release -- --ignored
        echo "📈 Performance benchmarks completed"
    
    - name: Performance test summary
      if: always()
      run: |
        echo "## Performance Test Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Environment**: Ubuntu Latest" >> $GITHUB_STEP_SUMMARY
        echo "- **Node Configuration**: Development mode with RPC external" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Duration**: ~30 minutes" >> $GITHUB_STEP_SUMMARY
        echo "- **Metrics**: Throughput, latency, resource utilization" >> $GITHUB_STEP_SUMMARY

  notification:
    name: Notification
    runs-on: ubuntu-latest
    needs: [e2e-integration-tests, performance-tests]
    if: always()
    
    steps:
    - name: Notify on test completion
      run: |
        if [ "${{ needs.e2e-integration-tests.result }}" == "success" ]; then
          echo "🎉 **E2E Integration Tests: SUCCESS**" 
          echo "✅ All tests passed and framework is ready for production"
        else
          echo "⚠️ **E2E Integration Tests: FAILED**"
          echo "❌ Check logs and fix issues before deployment"
        fi
