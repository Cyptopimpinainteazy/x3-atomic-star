name: Test Integrity Enforcement

on:
  pull_request:
    branches: [main]

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect dishonest test changes
        run: |
          echo "🔍 CI: Scanning for test tampering"

          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --name-only)

          TESTS=$(echo "$DIFF" | grep -E "(test_|_test\.|/tests/|\.spec\.|\.test\.)" || true)
          SRC=$(echo "$DIFF" | grep -E "(src/|lib/|app/|crates/|pallets/|packages/)" || true)

          if [[ -n "$TESTS" && -z "$SRC" ]]; then
            echo "❌ CI BLOCKED: Tests changed without source fixes."
            echo "$TESTS"
            exit 1
          fi

      - name: Run Python tests (full)
        run: |
          echo "🧪 Running full pytest suite"
          pip3 install -r requirements.txt || true
          pytest -q || exit 1

      - name: Run Rust tests (full workspace)
        run: |
          echo "🧪 Running full Rust workspace tests"
          cargo test --workspace || exit 1

      - name: Run TS/SDK tests (full)
        run: |
          echo "🧪 Running full TypeScript SDK tests"
          npm test --workspace packages/ts-sdk || true
