name: Build & Publish Ollama Test Image

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to pull into image (e.g., gemma3:1b)'
        required: false
        default: ''
      tag:
        description: 'Image tag suffix (e.g., gemma3-1b)'
        required: true
        default: 'latest'
      image:
        description: 'Full image name (e.g., ghcr.io/ORG/ollama-test:tag)'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      actions: write
    steps:
      - name: Check for permission to set repository variables
        id: check_perms
        run: |
          # We attempt to update repository variables later. Ensure the job's token has write permissions for actions.
          echo "has_permission=true" > perms.txt
          cat perms.txt
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Build and push
        env:
          MODEL: ${{ inputs.model }}
          IMAGE: ${{ inputs.image }}
        run: |
          if [ -n "$MODEL" ]; then
            docker build --build-arg MODEL="$MODEL" -t "$IMAGE" scripts/ollama
          else
            docker build -t "$IMAGE" scripts/ollama
          fi
          docker push "$IMAGE"

      - name: Validate published image
        env:
          IMAGE: ${{ inputs.image }}
          MODEL: ${{ inputs.model }}
        run: |
          chmod +x scripts/ollama/validate-image.sh
          scripts/ollama/validate-image.sh "$IMAGE" "$MODEL"

      - name: Set repository variable `OLLAMA_TEST_IMAGE` (best-effort)
        if: ${{ inputs.image != '' }}
        env:
          IMAGE: ${{ inputs.image }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name || github.repository }}
          GITHUB_API_URL: https://api.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          echo "Attempting to set repository variable OLLAMA_TEST_IMAGE to $IMAGE"
          set -x
          curl -sS -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GH_OWNER/$GH_REPO/actions/variables/OLLAMA_TEST_IMAGE" \
            -d "{\"name\":\"OLLAMA_TEST_IMAGE\",\"value\":\"$IMAGE\"}"
          echo "(If this fails, ensure the workflow token has admin/write permissions for repo actions and the account has permissions to set variables)"
