name: E2E: CHAIN-CONSENSUS-001 (state-root replay)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *' # nightly UTC

concurrency:
  group: e2e-state-root-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-state-root:
    name: E2E state-root replay (run ${{ matrix.run }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        run: [1, 2, 3]
    env:
      DOCKER_COMPOSE_PROJECT: e2e-${{ github.run_id }}-run${{ matrix.run }}
      E2E_DETERMINISTIC_TRIPLE_RUN: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-run${{ matrix.run }}

      - name: Build workspace (precompile tests)
        run: cargo test -p x3-compiler --no-run

      - name: Start E2E environment
        env:
          DOCKER_COMPOSE_PROJECT: ${{ env.DOCKER_COMPOSE_PROJECT }}
        run: |
          chmod +x tests/e2e/start_test_environment.sh
          set -e
          echo "Bringing up E2E test environment (project ${DOCKER_COMPOSE_PROJECT})"
          DOCKER_COMPOSE_PROJECT="${DOCKER_COMPOSE_PROJECT}" tests/e2e/start_test_environment.sh up &
          echo "Waiting for node RPC to respond on http://127.0.0.1:9933/"
          tests/e2e/wait_for_rpc.sh "http://127.0.0.1:9933/" system_health 300 || true

      - name: Run CHAIN-CONSENSUS-001 state-root replay test
        env:
          DOCKER_COMPOSE_PROJECT: ${{ env.DOCKER_COMPOSE_PROJECT }}
          E2E_DETERMINISTIC_TRIPLE_RUN: ${{ env.E2E_DETERMINISTIC_TRIPLE_RUN }}
        run: |
          chmod +x tests/e2e/ci_run_state_root_test.sh
          tests/e2e/ci_run_state_root_test.sh "run-${{ matrix.run }}" artifacts/run-${{ matrix.run }}/logs

      - name: Collect diagnostics (always)
        if: always()
        env:
          DOCKER_COMPOSE_PROJECT: ${{ env.DOCKER_COMPOSE_PROJECT }}
        run: |
          mkdir -p artifacts/run-${{ matrix.run }}/logs
          echo "Collecting docker-compose logs..."
          docker compose -p "${DOCKER_COMPOSE_PROJECT}" logs --no-color > artifacts/run-${{ matrix.run }}/logs/docker-compose.log || true
          echo "Listing docker containers..."
          docker ps -a > artifacts/run-${{ matrix.run }}/logs/docker-ps.log || true
          echo "Collecting dmesg tail..."
          dmesg | tail -n 200 > artifacts/run-${{ matrix.run }}/logs/dmesg.log || true

      - name: Sanitize artifacts (always)
        if: always()
        run: |
          chmod +x scripts/ci/sanitize_artifacts_v2.sh
          scripts/ci/sanitize_artifacts_v2.sh artifacts/run-${{ matrix.run }} || true

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-state-root-artifacts-run-${{ matrix.run }}-${{ github.run_id }}
          path: artifacts/run-${{ matrix.run }}

      - name: Tear down E2E environment (always)
        if: always()
        env:
          DOCKER_COMPOSE_PROJECT: ${{ env.DOCKER_COMPOSE_PROJECT }}
        run: |
          echo "Tearing down E2E environment (project ${DOCKER_COMPOSE_PROJECT})"
          DOCKER_COMPOSE_PROJECT="${DOCKER_COMPOSE_PROJECT}" tests/e2e/start_test_environment.sh down || docker compose -p "${DOCKER_COMPOSE_PROJECT}" down -v || true

  compare-artifacts:
    name: Compare triple-run artifacts
    runs-on: ubuntu-latest
    needs: e2e-state-root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts for run 1
        uses: actions/download-artifact@v4
        with:
          name: e2e-state-root-artifacts-run-1-${{ github.run_id }}
          path: artifacts/run-1

      - name: Download artifacts for run 2
        uses: actions/download-artifact@v4
        with:
          name: e2e-state-root-artifacts-run-2-${{ github.run_id }}
          path: artifacts/run-2

      - name: Download artifacts for run 3
        uses: actions/download-artifact@v4
        with:
          name: e2e-state-root-artifacts-run-3-${{ github.run_id }}
          path: artifacts/run-3

      - name: Compare artifacts and verify determinism
        run: |
          chmod +x tests/e2e/compare_artifacts.sh
          tests/e2e/compare_artifacts.sh artifacts/run-1 artifacts/run-2 artifacts/run-3

  proc-macro-trybuild:
    name: Proc-macro trybuild tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run trybuild tests (invariant-macros)
        env:
          INVARIANT_REGISTRY_PATH: tests/invariants/registry.toml
          INVARIANT_REGISTRY_STRICT: '1'
        run: |
          cargo test -p invariant-macros --test trybuild -- --nocapture

