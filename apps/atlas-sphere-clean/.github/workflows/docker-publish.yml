name: Build and publish GPU Swarm Docker image

on:
  push:
    branches: [ main, "release/*" ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/gpu-swarm/docker/Dockerfile.nvidia
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gpu-swarm:latest
            ghcr.io/${{ github.repository_owner }}/gpu-swarm:${{ github.sha }}

      - name: Verify images
        run: |
          echo "Docker images pushed to ghcr.io/${{ github.repository_owner }}/gpu-swarm"
