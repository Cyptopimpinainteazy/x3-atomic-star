name: swarm-dashboard pipeline smoke

on:
  pull_request:
    paths:
      - 'apps/swarm-dashboard/**'
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC

jobs:
  smoke:
    name: Pipeline smoke (swarm-dashboard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/swarm-dashboard/package-lock.json'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: apps/swarm-dashboard/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/swarm-dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/swarm-dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        working-directory: ./swarm-dashboard
        run: |
          npm ci --legacy-peer-deps || true
          npm install --no-audit --no-fund

      - name: Install Playwright Browsers
        working-directory: ./swarm-dashboard
        run: npx playwright install --with-deps

      - name: Run pipeline smoke test
        working-directory: ./swarm-dashboard
        run: npx playwright test e2e/tests/pipeline-smoke.spec.ts --config e2e/playwright.config.ts --reporter=list
        env:
          # Allow overriding the RPC URL via repo variables or env when needed
          NEXT_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_RPC_URL }}
          NEXT_PUBLIC_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_PUBLIC_RPC_URL }}

      - name: Upload Playwright traces (if failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/swarm-dashboard/test-results/**
