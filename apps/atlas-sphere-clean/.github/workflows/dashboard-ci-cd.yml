name: Dashboard CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/swarm-dashboard/**'
      - '.github/workflows/dashboard-ci-cd.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/swarm-dashboard/**'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'apps/swarm-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: apps/swarm-dashboard
        run: npm ci

      - name: Lint code
        working-directory: apps/swarm-dashboard
        run: npm run lint --if-present
        continue-on-error: true

      - name: Type check
        working-directory: apps/swarm-dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/swarm-dashboard
        run: npm run build

      - name: Check bundle size
        working-directory: apps/swarm-dashboard
        run: |
          DIST_SIZE=$(du -sh dist | cut -f1)
          echo "📦 Build size: $DIST_SIZE"
          if [ $(du -sb dist | cut -f1) -gt 1048576 ]; then
            echo "⚠️  Bundle size exceeds 1MB (gzipped)"
          fi

      - name: Upload build artifacts
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: apps/swarm-dashboard/dist
          retention-days: 5

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'apps/swarm-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: apps/swarm-dashboard
        run: npm ci

      - name: Run tests
        working-directory: apps/swarm-dashboard
        run: npm test --if-present --coverage
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/swarm-dashboard/coverage/coverage-final.json
          fail_ci_if_error: false
        if: always()

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'apps/swarm-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: apps/swarm-dashboard
        run: npm ci

      - name: Audit dependencies
        working-directory: apps/swarm-dashboard
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'x3-swarm-dashboard'
          path: 'apps/swarm-dashboard'
          format: 'JSON'
          args: >
            --enableExperimental
            --scan apps/swarm-dashboard
        continue-on-error: true

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: 'apps/swarm-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: apps/swarm-dashboard
        run: npm ci

      - name: Run ESLint
        working-directory: apps/swarm-dashboard
        run: npx eslint src --ext .ts,.tsx --format json > eslint-report.json || true
        continue-on-error: true

      - name: Run Prettier
        working-directory: apps/swarm-dashboard
        run: npx prettier --check src
        continue-on-error: true

      - name: SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: env.SONAR_HOST_URL != ''
        continue-on-error: true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, test, security, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: apps/swarm-dashboard/dist

      - name: Deploy to staging server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_KEY }}
        run: |
          if [ -n "$STAGING_HOST" ]; then
            mkdir -p ~/.ssh
            echo "$STAGING_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts 2>/dev/null
            
            # Deploy dashboard
            scp -i ~/.ssh/deploy_key -r apps/swarm-dashboard/dist/* \
              $STAGING_USER@$STAGING_HOST:/var/www/dashboard-staging/
            
            # Clear SSH key
            rm ~/.ssh/deploy_key
            
            echo "✅ Deployed to staging: https://staging-dashboard.x3-chain.com"
          fi
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, test, security, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: apps/swarm-dashboard/dist

      - name: Publish to Docker Registry
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ]; then
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            docker build -f apps/swarm-dashboard/Dockerfile \
              -t x3-chain-dashboard:${{ github.sha }} \
              -t x3-chain-dashboard:latest \
              apps/swarm-dashboard/
            
            docker tag x3-chain-dashboard:latest \
              $DOCKER_USERNAME/x3-chain-dashboard:latest
            
            docker push $DOCKER_USERNAME/x3-chain-dashboard:latest
          fi
        continue-on-error: true

      - name: Deploy to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_KEY: ${{ secrets.PROD_KEY }}
        run: |
          if [ -n "$PROD_HOST" ]; then
            mkdir -p ~/.ssh
            echo "$PROD_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts 2>/dev/null
            
            # Deploy dashboard
            scp -i ~/.ssh/deploy_key -r apps/swarm-dashboard/dist/* \
              $PROD_USER@$PROD_HOST:/var/www/dashboard/
            
            # Clear SSH key
            rm ~/.ssh/deploy_key
            
            echo "✅ Deployed to production: https://dashboard.x3-chain.com"
          fi
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dashboard-v${{ github.run_number }}
          name: Dashboard Release ${{ github.run_number }}
          body: |
            Production deployment of GPU Swarm Dashboard
            
            **Changes:**
            - Build: ${{ github.sha }}
            - Node: 20.x
            - Status: All tests passed
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, test, security, quality, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          fi

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Dashboard CI/CD Pipeline",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 Dashboard Pipeline *${{ needs.build.result == 'success' && 'PASSED' || 'FAILED' }}*\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        continue-on-error: true
