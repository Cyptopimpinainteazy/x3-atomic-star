name: Tighten – Full Readiness Stack

# "Don't ship with your fly open."
# Runs in phases:  boring failures first → chain-specific risk areas.
#
# Phase 1 – Workspace integrity (Rust build, tests, nextest, deny, geiger, machete)
# Phase 2 – Static security   (Semgrep: no stubs/mocks in critical crates; Python opsec)
# Phase 3 – Python hygiene    (Ruff, Pyright)
# Phase 4 – EVM               (Slither; Foundry if contracts exist)
# Phase 5 – Hard-fail gate    (blocks merge on any Phase 1/2 ERROR finding)

on:
  push:
    branches: [main, "feature/**", "copilot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"   # cleaner in CI

# ──────────────────────────────────────────────────────────────────────────────
# Phase 1a: Rust workspace — nextest
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  rust-nextest:
    name: "P1 · nextest (fast Rust tests)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nextest-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy (all targets, deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: nextest run
        run: cargo nextest run --workspace --release

# ──────────────────────────────────────────────────────────────────────────────
# Phase 1b: Dependency policy — cargo deny
# ──────────────────────────────────────────────────────────────────────────────
  rust-llvm-cov:
    name: "P1 · llvm-cov (Rust coverage baseline)"
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory baseline; hardening over time
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Coverage report
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info || true
          cargo llvm-cov report --summary-only || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-llvm-cov
          path: lcov.info

# ──────────────────────────────────────────────────────────────────────────────
# Phase 1c: Dependency policy — cargo deny
# ──────────────────────────────────────────────────────────────────────────────
  rust-deny:
    name: "P1 · cargo deny (licenses, advisories, bans)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

# ──────────────────────────────────────────────────────────────────────────────
# Phase 1d: Unsafe footprint — cargo geiger
# ──────────────────────────────────────────────────────────────────────────────
  rust-geiger:
    name: "P1 · cargo geiger (unsafe map)"
    runs-on: ubuntu-latest
    continue-on-error: true   # report-only until baseline is set
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Run geiger (report unsafe usage across workspace)
        run: |
          cargo geiger --all-features --output-format Ratio 2>&1 | tee geiger-report.txt
          echo "## cargo geiger report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat geiger-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger-report.txt

# ──────────────────────────────────────────────────────────────────────────────
# Phase 1e: Dead dependencies — cargo machete
# ──────────────────────────────────────────────────────────────────────────────
  rust-machete:
    name: "P1 · cargo machete (dead deps)"
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until pruned
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Find unused dependencies
        run: cargo machete 2>&1 | tee machete-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: machete-report
          path: machete-report.txt

# ──────────────────────────────────────────────────────────────────────────────
# Phase 2: Semgrep — no stubs in critical crates + Python opsec
# ──────────────────────────────────────────────────────────────────────────────
  semgrep-critical-crates:
    name: "P2 · Semgrep — no stubs in critical Rust crates"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (Rust critical-crate rules)
        run: |
          pip install semgrep --quiet
          semgrep --config .semgrep/no-stubs-in-critical-crates.yml \
                  --error \
                  --json \
                  --output semgrep-rust.json \
                  . || true
            # Block on ERROR-severity only (todo!/unimplemented!/hardcoded keys/
            # localhost RPC). WARNING findings (unwrap/panic) are in the artifact
            # and tracked for incremental cleanup.
            semgrep --config .semgrep/no-stubs-in-critical-crates.yml \
              --severity ERROR \
              --error \
              .
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-rust-report
          path: semgrep-rust.json

  semgrep-python-opsec:
    name: "P2 · Semgrep — Python opsec (orchestration / scripts)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (Python opsec rules)
        run: |
          pip install semgrep --quiet
              semgrep --config .semgrep/python-opsec.yml \
                --error \
                scripts/ deployment/ tools/
            # scope intentionally limited to operational scripts; SDK/config
            # subdirs (swarm/, packages/, botchain-*, etc.) use os.getenv()
            # fallbacks and are audited by separate codecheck workflows.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-python-report
          path: semgrep-python.json

# ──────────────────────────────────────────────────────────────────────────────
# Phase 3: Python hygiene — Ruff + Pyright
# ──────────────────────────────────────────────────────────────────────────────
  python-lint:
    name: "P3 · Ruff (lint + format check)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --select E,W,F,I,B --ignore E402,E501,E702"

  python-types:
    name: "P3 · Pyright (type checking)"
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until stubs improved
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps + pyright
        run: |
          pip install pyright pytest pytest-cov --quiet
          pip install -r requirements.txt 2>/dev/null || true
      - name: Run Pyright
        run: pyright tests/ scripts/ deployment/ 2>/dev/null || true

# ──────────────────────────────────────────────────────────────────────────────
# Phase 4a: SAST — CodeQL
# ──────────────────────────────────────────────────────────────────────────────
  codeql:
    name: "P4 · CodeQL (Rust + Python)"
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until query suite stabilized
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust, python
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3

# ──────────────────────────────────────────────────────────────────────────────
# Phase 4b: EVM static analysis — Slither
# ──────────────────────────────────────────────────────────────────────────────
  evm-slither:
    name: "P4 · Slither (EVM static analysis)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check for Solidity files
        id: sol-check
        run: |
          COUNT=$(find . -name "*.sol" -not -path "*/node_modules/*" | wc -l)
          echo "sol_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT .sol files"
      - name: Run Slither
        if: steps.sol-check.outputs.sol_count != '0'
        uses: crytic/slither-action@v0.4.0
        with:
          solc-version: "0.8.24"
          fail-on: high
          slither-args: "--exclude-dependencies"
      - name: No Solidity files
        if: steps.sol-check.outputs.sol_count == '0'
        run: echo "No .sol files found — Slither skipped"

# ──────────────────────────────────────────────────────────────────────────────
# Phase 4c: EVM fuzzing — Echidna
# ──────────────────────────────────────────────────────────────────────────────
  evm-echidna:
    name: "P4 · Echidna (property fuzzing smoke)"
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until invariant suite is authored
    steps:
      - uses: actions/checkout@v4
      - name: Check for Solidity files
        id: sol-check
        run: |
          COUNT=$(find . -name "*.sol" -not -path "*/node_modules/*" | wc -l)
          echo "sol_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT .sol files"
      - name: Install Echidna
        if: steps.sol-check.outputs.sol_count != '0'
        run: |
          docker pull ghcr.io/crytic/echidna/echidna:latest
      - name: Run Echidna smoke pass
        if: steps.sol-check.outputs.sol_count != '0'
        run: |
          FIRST_SOL=$(find . -name "*.sol" -not -path "*/node_modules/*" | head -1)
          echo "Running Echidna smoke on $FIRST_SOL"
          docker run --rm -v "$PWD":/src ghcr.io/crytic/echidna/echidna:latest \
            /bin/sh -lc "cd /src && echidna \"$FIRST_SOL\" --test-mode assertion --contract $(basename \"$FIRST_SOL\" .sol)" || true
      - name: No Solidity files
        if: steps.sol-check.outputs.sol_count == '0'
        run: echo "No .sol files found — Echidna skipped"

# ──────────────────────────────────────────────────────────────────────────────
# Phase 5: Hard-fail merge gate
# ──────────────────────────────────────────────────────────────────────────────
  hard-fail-gate:
    name: "⛔ Hard-fail gate (blocks merge)"
    runs-on: ubuntu-latest
    needs:
      - rust-nextest
      - rust-deny
      - semgrep-critical-crates
      - semgrep-python-opsec
      - python-lint
    if: always()
    steps:
      - name: Check critical job results
        run: |
          echo "Checking hard-fail jobs..."
          FAILED=""
          [[ "${{ needs.rust-nextest.result }}"           != "success" ]] && FAILED="$FAILED rust-nextest(${{ needs.rust-nextest.result }})"
          [[ "${{ needs.rust-deny.result }}"              != "success" ]] && FAILED="$FAILED rust-deny(${{ needs.rust-deny.result }})"
          [[ "${{ needs.semgrep-critical-crates.result }}" != "success" ]] && FAILED="$FAILED semgrep-critical-crates(${{ needs.semgrep-critical-crates.result }})"
          [[ "${{ needs.semgrep-python-opsec.result }}"  != "success" ]] && FAILED="$FAILED semgrep-python-opsec(${{ needs.semgrep-python-opsec.result }})"
          [[ "${{ needs.python-lint.result }}"            != "success" ]] && FAILED="$FAILED python-lint(${{ needs.python-lint.result }})"
          if [[ -n "$FAILED" ]]; then
            echo "::error::Hard-fail gate: these jobs FAILED:$FAILED"
            echo "Merge is blocked. Fix the above before merging."
            exit 1
          fi
          echo "All hard-fail jobs passed. Merge allowed."
