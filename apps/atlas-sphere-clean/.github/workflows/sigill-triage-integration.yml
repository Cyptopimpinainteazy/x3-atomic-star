name: SIGILL triage integration test

on:
  pull_request:
    paths:
      - 'apps/swarm-dashboard/**'

permissions:
  issues: write
  contents: read

jobs:
  sigill-integration:
    runs-on: ubuntu-latest
    env:
      SIGILL_FALLBACK_COMMENT_ENABLED: ${{ secrets.SIGILL_FALLBACK_COMMENT_ENABLED || 'false' }}
      SIGILL_FALLBACK_COMMENT_MIN_ATTEMPTS: ${{ secrets.SIGILL_FALLBACK_COMMENT_MIN_ATTEMPTS || '2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create fake diagnostic artifact (SIGILL)
        run: |
          mkdir -p artifacts
          echo "[  123.456789] kernel: process test: SIGILL at 0xdeadbeef" > artifacts/dmesg.tail
          echo "ILL_ILLOPN: illegal opcode" >> artifacts/strace.log
          ls -la artifacts

      - name: Run detection and create test issue
        uses: actions/github-script@v6
        id: detect_create
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'artifacts';
            const patterns = [/SIGILL/, /ILL_ILLOPN/];
            const matches = [];

            function walk(dir) {
              const files = [];
              if (!fs.existsSync(dir)) return files;
              for (const f of fs.readdirSync(dir)) {
                const p = `${dir}/${f}`;
                const st = fs.statSync(p);
                if (st.isDirectory()) files.push(...walk(p));
                else files.push(p);
              }
              return files;
            }

            for (const f of walk(path)) {
              try {
                const content = fs.readFileSync(f, 'utf8');
                for (const re of patterns) {
                  if (re.test(content)) {
                    matches.push(f);
                    break;
                  }
                }
              } catch (e) {
                // binary files may throw; ignore
              }
            }

            if (matches.length === 0) {
              core.info = core && core.info ? core.info : console.log;
              console.log('No SIGILL patterns found in artifacts.');
              return core.setOutput('created', 'false');
            } else {
              const prNumber = context.payload.pull_request && context.payload.pull_request.number ? context.payload.pull_request.number : null;
              const runId = context.runId || process.env.GITHUB_RUN_ID || 'manual';
              const title = `[TEST] SIGILL observed in CI (run ${runId}${prNumber ? `, PR #${prNumber}` : ''})`;

              let body = '';
              const templatePath = '.github/ISSUE_TEMPLATE/sigill-crash-report.md';
              if (fs.existsSync(templatePath)) {
                body = fs.readFileSync(templatePath, 'utf8') + '\n\n';
              }
              body += `**Workflow run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}\n`;
              if (prNumber) body += `**Pull request:** #${prNumber}\n`;
              body += `**Found in files:**\n${matches.map(f => `- ${f}`).join('\n')}\n`;

              // Prevent duplicates by searching open issues with same title
              const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open' });
              if (!issues.some(i => i.title === title)) {
                const issue = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['bug', 'diagnostics', 'integration-test'] });
                console.log(`Opened issue: ${issue.data.number}`);
                core.setOutput('issue_number', issue.data.number);
                core.setOutput('created', 'true');
              } else {
                console.log('An open issue with the same title already exists; skipping creation.');
                core.setOutput('created', 'false');
              }
            }

      - name: Re-run detection to validate duplicate protection
        uses: actions/github-script@v6
        id: detect_duplicate
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Run same detection and record whether a new issue would be created (should be skipped).
            // Prefer checking the issue number returned by the create step (avoids timing/race issues).
            // If we don't have an issue number, fall back to listing open issues and retry a few times with exponential backoff.
            const fs = require('fs');
            const path = 'artifacts';
            const patterns = [/SIGILL/, /ILL_ILLOPN/];
            const matches = [];
            function walk(dir) {
              const files = [];
              if (!fs.existsSync(dir)) return files;
              for (const f of fs.readdirSync(dir)) {
                const p = `${dir}/${f}`;
                const st = fs.statSync(p);
                if (st.isDirectory()) files.push(...walk(p));
                else files.push(p);
              }
              return files;
            }
            for (const f of walk(path)) {
              try {
                const content = fs.readFileSync(f, 'utf8');
                for (const re of patterns) {
                  if (re.test(content)) {
                    matches.push(f);
                    break;
                  }
                }
              } catch (e) {}
            }
            if (matches.length === 0) {
              core.setOutput('duplicate_ok', 'na');
              core.setOutput('fallback_used', 'false');
              core.setOutput('fallback_attempts', '0');
              return;
            }

            const prNumber = context.payload.pull_request && context.payload.pull_request.number ? context.payload.pull_request.number : null;
            const runId = context.runId || process.env.GITHUB_RUN_ID || 'manual';
            const title = `[TEST] SIGILL observed in CI (run ${runId}${prNumber ? `, PR #${prNumber}` : ''})`;

            // If the previous step returned an issue number, check that issue directly (avoids timing issues)
            const issueNum = parseInt(core.getInput('issue-number') || process.env.ISSUE_NUMBER || '${{ steps.detect_create.outputs.issue_number }}');
            let count = 0;
            let fallbackUsed = false;
            let attempts = 0;
            if (issueNum) {
              try {
                const { data: issue } = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum });
                if (issue.state === 'open' && issue.title === title) count = 1;
                console.log(`Checked issue #${issueNum}: state=${issue.state}, title='${issue.title}'`);
              } catch (e) {
                console.log(`Could not fetch issue #${issueNum}: ${e}`);
              }
            } else {
              // List-based fallback with retries/backoff
              const maxAttempts = 5; // increased for robustness (1s,2s,4s,8s)
              attempts = 0;
              const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open' });
              count = issues.filter(i => i.title === title).length;
              while (count === 0 && attempts < maxAttempts) {
                attempts++;
                const jitter = Math.floor(Math.random() * 250); // jitter 0-249ms
                const delay = Math.min(1000 * Math.pow(2, attempts - 1), 8000) + jitter;
                console.log(`No matching open issue found; retrying (${attempts}/${maxAttempts}) after ${delay}ms (jitter=${jitter}ms)`);
                await new Promise(res => setTimeout(res, delay));
                const { data: issues2 } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open' });
                count = issues2.filter(i => i.title === title).length;
              }
              if (attempts > 0) fallbackUsed = true;
              console.log(`Existing open issues with title '${title}': ${count}`);
            }
            core.setOutput('duplicate_ok', count === 1 ? 'true' : 'false');
            core.setOutput('fallback_used', fallbackUsed ? 'true' : 'false');
            core.setOutput('fallback_attempts', `${attempts}`);

      - name: Log fallback usage
        run: |
          echo "detect_duplicate.fallback_used=${{ steps.detect_duplicate.outputs.fallback_used }}"
          echo "detect_duplicate.fallback_attempts=${{ steps.detect_duplicate.outputs.fallback_attempts }}"
          if [ "${{ steps.detect_duplicate.outputs.fallback_used }}" = "true" ]; then
            echo "::warning::Fallback to list-based detection was used (retry applied)."
          fi

      - name: Post PR comment (opt-in)
        if: env.SIGILL_FALLBACK_COMMENT_ENABLED == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const attempts = parseInt('${{ steps.detect_duplicate.outputs.fallback_attempts }}' || '0');
            const min = parseInt(process.env.SIGILL_FALLBACK_COMMENT_MIN_ATTEMPTS || '2');
            if (attempts >= min) {
              const pr = context.payload.pull_request && context.payload.pull_request.number;
              if (!pr) {
                console.log('Not a pull_request event; skipping comment.');
                return;
              }
              const body = `Note: SIGILL duplicate-detection fallback was used in this run (attempts=${attempts}). If you'd like to opt out of PR comments, set SIGILL_FALLBACK_COMMENT_ENABLED=false for this repository.`;
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, body });
              console.log(`Posted fallback comment to PR #${pr}`);
            } else {
              console.log(`Fallback attempts ${attempts} < ${min}; skipping PR comment.`);
            }
        env:
          SIGILL_FALLBACK_COMMENT_MIN_ATTEMPTS: ${{ secrets.SIGILL_FALLBACK_COMMENT_MIN_ATTEMPTS || '2' }}

      - name: Write fallback telemetry
        run: |
          mkdir -p artifacts
          cat > artifacts/fallback-telemetry.json <<JSON
          {
            "run_id": "${{ github.run_id }}",
            "pr": "${{ github.event.pull_request.number }}",
            "fallback_used": "${{ steps.detect_duplicate.outputs.fallback_used }}",
            "fallback_attempts": "${{ steps.detect_duplicate.outputs.fallback_attempts }}",
            "timestamp": "$(date --utc +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          ls -la artifacts

      - name: Upload fallback telemetry
        uses: actions/upload-artifact@v4
        with:
          name: sigill-fallback-telemetry
          path: artifacts/fallback-telemetry.json

      - name: Cleanup test issue
        if: steps.detect_create.outputs.created == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const num = parseInt(core.getInput('issue-number') || process.env.ISSUE_NUMBER || '${{ steps.detect_create.outputs.issue_number }}');
            const issue = num;
            if (!issue) {
              console.log('No issue number to clean up.');
              return;
            }
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue, state: 'closed' });
            console.log(`Closed issue ${issue}`);
        env:
          ISSUE_NUMBER: ${{ steps.detect_create.outputs.issue_number }}

      - name: Assert duplicate protection
        if: steps.detect_create.outputs.created == 'true'
        run: |
          if [ "${{ steps.detect_duplicate.outputs.duplicate_ok }}" != "true" ]; then
            echo "Duplicate protection failed (expected a single open issue with that title).";
            exit 1;
          else
            echo "Duplicate protection passed.";
          fi
