name: Startup Smoke Check

on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run startup smoke script (assumes services available on localhost)
        run: |
          chmod +x ./tests/startup_smoke.sh
          ./tests/startup_smoke.sh
        # Note: This job expects services to already be running on localhost in the runner environment.
