name: SVM Counter Integration (isolated)

on:
  push:
    paths:
      - 'integration-tests/svm-counter-test/**'
      - 'crates/svm-counter/**'
      - 'crates/svm-integration/**'
  pull_request:
    paths:
      - 'integration-tests/svm-counter-test/**'
      - 'crates/svm-counter/**'
      - 'crates/svm-integration/**'

jobs:
  svm-counter-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run SVM counter integration test (isolated crate)
        working-directory: integration-tests/svm-counter-test
        run: cargo test --test counter -- --nocapture
