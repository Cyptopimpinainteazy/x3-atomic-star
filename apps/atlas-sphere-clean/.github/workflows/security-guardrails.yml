name: Security Guardrails

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/x3-desktop/src-tauri/**'
      - '.github/workflows/security-guardrails.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/x3-desktop/src-tauri/**'
      - '.github/workflows/security-guardrails.yml'

jobs:
  tauri-security-audit:
    name: Tauri Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Shell Permission Guardrail ─────────────────────────────────────
      # Fails if any capabilities file grants broad shell permissions
      # without scoped allowlists. This prevents renderer→RCE attacks.
      - name: Check for broad shell permissions
        run: |
          echo "🔒 Checking for dangerous shell permissions..."
          SHELL_PATTERNS="shell:allow-execute|shell:allow-spawn|shell:allow-stdin-write"
          
          VIOLATIONS=$(grep -rn "$SHELL_PATTERNS" \
            apps/x3-desktop/src-tauri/capabilities/ \
            --include="*.json" \
            || true)
          
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ SECURITY VIOLATION: Broad shell permissions detected!"
            echo ""
            echo "Found in:"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Remove shell:allow-execute/spawn/stdin-write or add"
            echo "scoped allowlists per Tauri v2 shell plugin documentation."
            echo "See: https://v2.tauri.app/plugin/shell/"
            exit 1
          fi
          
          echo "✅ No broad shell permissions found"

      # ── CSP Guardrail ──────────────────────────────────────────────────
      # Fails if CSP contains unsafe-eval in production builds.
      # unsafe-inline is allowed for style-src only (Tauri requirement).
      - name: Check for unsafe-eval in CSP
        run: |
          echo "🔒 Checking CSP for unsafe-eval..."
          
          UNSAFE_EVAL=$(grep -rn "unsafe-eval" \
            apps/x3-desktop/src-tauri/tauri.conf.json \
            || true)
          
          if [ -n "$UNSAFE_EVAL" ]; then
            echo "❌ SECURITY VIOLATION: unsafe-eval found in CSP!"
            echo ""
            echo "Found in:"
            echo "$UNSAFE_EVAL"
            echo ""
            echo "Fix: Remove 'unsafe-eval' from script-src."
            echo "See: https://v2.tauri.app/security/csp/"
            exit 1
          fi
          
          echo "✅ No unsafe-eval in CSP"

      # ── Capability Scope Check ─────────────────────────────────────────
      # Warns if broad wildcard permissions are used.
      - name: Audit capability scopes
        run: |
          echo "🔒 Auditing capability scopes..."
          
          # Check for shell:default (too broad)
          SHELL_DEFAULT=$(grep -rn "shell:default" \
            apps/x3-desktop/src-tauri/capabilities/ \
            --include="*.json" \
            || true)
          
          if [ -n "$SHELL_DEFAULT" ]; then
            echo "⚠️ WARNING: shell:default grants broad permissions"
            echo "Consider using specific shell:allow-* with scoped commands"
            echo "$SHELL_DEFAULT"
          fi
          
          # Check for fs:default without scope restrictions
          FS_DEFAULT=$(grep -rn '"fs:default"' \
            apps/x3-desktop/src-tauri/capabilities/ \
            --include="*.json" \
            || true)
          
          if [ -n "$FS_DEFAULT" ]; then
            echo "ℹ️ fs:default is enabled — ensure scope is appropriately restricted"
          fi
          
          echo "✅ Capability audit complete"

      # ── Navigation/Origin Guardrail ────────────────────────────────────
      - name: Check for overly permissive origins
        run: |
          echo "🔒 Checking for wildcard origins in CSP..."
          
          WILDCARDS=$(grep -oP "connect-src[^;]*\*" \
            apps/x3-desktop/src-tauri/tauri.conf.json \
            || true)
          
          if [ -n "$WILDCARDS" ]; then
            echo "⚠️ WARNING: Wildcard origins found in connect-src"
            echo "Consider restricting to specific endpoints"
            echo "$WILDCARDS"
          fi
          
          echo "✅ Origin check complete"

  # ── Rust Security Checks ─────────────────────────────────────────────
  rust-security:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true
      
      - name: Run cargo audit
        run: |
          echo "🔒 Running dependency security audit..."
          cargo audit --deny warnings 2>/dev/null || {
            echo "⚠️ Security advisories found — review and update dependencies"
            # Don't fail on advisories for now, just warn
            true
          }
