name: swarm-dashboard axe triage

on:
  pull_request:
    paths:
      - 'apps/swarm-dashboard/**'
      - '.github/workflows/swarm-dashboard-axe-triage.yml'

jobs:
  axe-triage:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create triage issue for Axe violations (if file present)
        if: github.event_name == 'pull_request'
        env:
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          ASSIGNEE: ${{ vars.AXE_TRIAGE_ASSIGNEE }}
        run: |
          echo "Preparing to create triage issue for Axe violations (axe-triage job)..."
          if [ -f apps/swarm-dashboard/e2e/axe-violations.json ]; then
            TITLE="A11y: Axe accessibility violations detected (PR #${PR})"
            hits=$(gh api search/issues -f q="repo:${REPO} is:issue is:open in:title \"${TITLE}\"" --jq '.total_count' 2>/dev/null || echo 0)
            echo "Found existing issues: $hits"
            if [ "$hits" -eq 0 ]; then
              echo "Creating new issue: $TITLE"
              summary=$(jq -r '.[] | "- \(.id) (impact: \(.impact)) — \(.nodes|length) nodes"' apps/swarm-dashboard/e2e/axe-violations.json | sed ':a;N;$!ba;s/\n/\\n/g')
              BODY="Axe accessibility check found violations on PR #${PR}:\n\n${summary}\n\nSee attached artifact 'axe-violations.json' for full details."
              if [ -n "${ASSIGNEE}" ]; then
                echo "Assignee configured: ${ASSIGNEE} — assigning issue"
                ISSUE=$(gh api repos/${REPO}/issues -f title="$TITLE" -f body="$BODY" -f labels='["accessibility","triage"]' -f 'assignees[]='"${ASSIGNEE}" --jq '.number')
              else
                ISSUE=$(gh api repos/${REPO}/issues -f title="$TITLE" -f body="$BODY" -f labels='["accessibility","triage"]' --jq '.number')
              fi
              echo "Opened issue #${ISSUE}"
              gh issue comment --repo ${REPO} ${PR} --body "Opened triage issue #${ISSUE} for accessibility violations: https://github.com/${REPO}/issues/${ISSUE}"
            else
              echo "Issue already exists, skipping creation."
            fi
          else
            echo "No axe-violations.json present, skipping."
          fi
