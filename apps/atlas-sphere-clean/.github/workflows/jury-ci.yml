name: Jury Service CI

on:
  push:
    branches: [main, feat/**, hotfix/**]
    paths:
      - 'swarm/jury/**'
      - 'swarm/api_server.py'
      - 'swarm/tests/test_jury*.py'
      - 'openspec/changes/add-offchain-jury/**'
      - '.github/workflows/jury-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'swarm/jury/**'
      - 'swarm/api_server.py'
      - 'swarm/tests/test_jury*.py'
      - 'openspec/changes/add-offchain-jury/**'

jobs:
  # Job 1: Validate OpenSpec change
  openspec-validation:
    name: Validate OpenSpec Change
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for change detection

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install OpenSpec tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema requests

      - name: Validate OpenSpec change
        working-directory: ./openspec/changes/add-offchain-jury
        run: |
          echo "Validating OpenSpec change structure..."
          
          # Check required files exist
          for file in proposal.md design.md tasks.md; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
          done
          
          echo "✓ All required OpenSpec files present"
          
          # Validate YAML/JSON structures if present
          for file in spec.yml spec.yaml spec.json; do
            if [ -f "$file" ]; then
              python -c "import yaml; yaml.safe_load(open('$file'))"
              echo "✓ Valid YAML/JSON in $file"
            fi
          done

      - name: Check documentation completeness
        working-directory: ./openspec/changes/add-offchain-jury
        run: |
          echo "Checking documentation..."
          
          # Verify proposal has clear objectives
          if grep -q "## Objectives" proposal.md; then
            echo "✓ Proposal has objectives section"
          fi
          
          # Verify design has rationale
          if grep -q "## Rationale\|## Design Rationale" design.md; then
            echo "✓ Design has rationale section"
          fi
          
          # Verify tasks are defined
          if grep -q "##.*Implementation\|2\." tasks.md; then
            echo "✓ Tasks are well-defined"
          fi

  # Job 2: Python linting and type checking
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: openspec-validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r swarm/requirements.txt
          pip install pylint flake8 black isort mypy pytest

      - name: Run Black formatter check
        run: |
          black --check swarm/jury/ swarm/tests/test_jury*.py || {
            echo "Code formatting issues found. Run: black swarm/jury/ swarm/tests/test_jury*.py"
            exit 1
          }

      - name: Run isort import sorting check
        run: |
          isort --check-only swarm/jury/ swarm/tests/test_jury*.py || {
            echo "Import sorting issues found. Run: isort swarm/jury/ swarm/tests/test_jury*.py"
            exit 1
          }

      - name: Run Flake8 linting
        run: |
          flake8 swarm/jury/ swarm/tests/test_jury*.py \
            --max-line-length=120 \
            --extend-ignore=E203,E266,E501,W503 \
            --count \
            --statistics

      - name: Run mypy type checking
        run: |
          mypy swarm/jury/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  # Job 3: Unit tests for jury module
  test-jury:
    name: Test Jury Module
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: jury_admin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: jury_audit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r swarm/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout

      - name: Create test database
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U jury_admin -d jury_audit -c \
            "CREATE TABLE IF NOT EXISTS jury_test (id SERIAL PRIMARY KEY);"

      - name: Run jury manager tests
        env:
          DATABASE_URL: postgresql://jury_admin:test_password@localhost:5432/jury_audit
        run: |
          pytest swarm/tests/test_jury.py -v --cov=swarm/jury/manager \
            --cov-report=term-missing --cov-report=xml --tb=short

      - name: Run jury audit tests
        env:
          DATABASE_URL: postgresql://jury_admin:test_password@localhost:5432/jury_audit
        run: |
          pytest swarm/tests/test_jury_audit.py -v --cov=swarm/jury/audit \
            --cov-report=term-missing --cov-report=xml --tb=short

      - name: Run jury API tests
        env:
          DATABASE_URL: postgresql://jury_admin:test_password@localhost:5432/jury_audit
        run: |
          pytest swarm/tests/test_jury_api.py -v --cov=swarm.api_server \
            --cov-report=term-missing --cov-report=xml --tb=short

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: jury-module
          name: jury-coverage
        continue-on-error: true

      - name: Generate coverage badge
        run: |
          coverage-badge -o coverage-jury.svg -f
        continue-on-error: true

  # Job 4: Docker build validation
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        gpu-enabled: ['false', 'true']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (CPU)
        if: matrix.gpu-enabled == 'false'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./openspec/changes/add-offchain-jury/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
            WITH_GPU=false
          tags: jury-service:test-${{ matrix.python-version }}-cpu
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (GPU)
        if: matrix.gpu-enabled == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./openspec/changes/add-offchain-jury/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
            WITH_GPU=true
          tags: jury-service:test-${{ matrix.python-version }}-gpu
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true  # GPU builds may fail in CI without NVIDIA runtime

  # Job 5: Integration tests with docker-compose
  integration-tests:
    name: Integration Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: [test-jury, docker-build]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: jury_admin
          POSTGRES_PASSWORD: test_password_secure
          POSTGRES_DB: jury_audit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r swarm/requirements.txt
          pip install pytest pytest-asyncio aiohttp

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://jury_admin:test_password_secure@localhost:5432/jury_audit
          REDIS_URL: redis://localhost:6379/0
          JURY_API_HOST: localhost
          JURY_API_PORT: 8000
        run: |
          # Start API server in background
          python -m swarm.api_server --port 8000 &
          SERVER_PID=$!
          sleep 3
          
          # Run integration tests
          pytest swarm/tests/test_jury_api.py -v --tb=short || TEST_RESULT=$?
          
          # Kill server
          kill $SERVER_PID 2>/dev/null || true
          
          exit ${TEST_RESULT:-0}
        continue-on-error: true  # Non-blocking for now

  # Job 6: Security scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scanner
        run: |
          python -m pip install bandit
          bandit -r swarm/jury/ -ll -i -x ./swarm/jury/__pycache__ || true
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Look for common secret patterns
          if grep -r "password\|secret\|api_key\|token" swarm/jury/*.py | \
             grep -v "test\|example\|TODO\|FIXME"; then
            echo "WARNING: Potential hardcoded secrets found. Please review."
          fi
        continue-on-error: true

  # Job 7: Summary and final status
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [openspec-validation, lint, test-jury, docker-build, security]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OpenSpec Validation: ${{ needs.openspec-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lint & Type Check: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test Jury Module: ${{ needs.test-jury.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Build: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Scan: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          
          # Exit with error if any critical job failed
          if [[ "${{ needs.test-jury.result }}" == "failure" ]]; then
            exit 1
          fi

      - name: Notify success
        if: success()
        run: echo "✅ All CI checks passed!"

      - name: Notify failure
        if: failure()
        run: echo "❌ CI pipeline failed. Check logs above."
