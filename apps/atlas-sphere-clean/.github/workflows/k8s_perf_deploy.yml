name: Perf Deploy & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_REGISTRY }}/x3-chain:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/x3-chain:${{ github.sha }}

      - name: Set up Kubeconfig
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy to test cluster
        env:
          KUBECONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          helm upgrade --install x3-chain charts/x3-chain --namespace testnet --create-namespace \
            --set image.repository=${{ secrets.DOCKER_REGISTRY }}/x3-chain \
            --set image.tag=${{ github.sha }} \
            --set postgres.url=${{ secrets.POSTGRES_URL }}

      - name: Wait for rollout
        run: kubectl -n testnet rollout status deployment/x3-chain --timeout=180s

  perf-test:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: sudo apt-get update && sudo apt-get install -y wget gnupg && wget -q -O - https://bintray.com/user/downloadSubjectPublicKey?username=bintray | sudo apt-key add - \
          && echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list \
          && sudo apt-get update && sudo apt-get install -y k6

      - name: Port-forward service
        env:
          KUBECONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          kubectl -n testnet port-forward svc/x3-chain 8080:80 &
          sleep 5

      - name: Run k6 load test
        env:
          TARGET_URL: http://127.0.0.1:8080
        run: k6 run tests/perf/k6/1k_tps_test.js

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: artifacts/**
