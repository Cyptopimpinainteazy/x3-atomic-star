repos:
  - repo: local
    hooks:
      - id: execution-banner-check-staged
        name: execution-banner-check-staged
        entry: scripts/check_staged_test_changes.py
        language: python
        types: [file]
        description: "Fail commit if only tests are changed (prevent test-mangling)."

      - id: test-tamper-detector
        name: precommit-test-tamper
        entry: scripts/pre-commit-test-tamper.sh
        language: script
        types: [file]
        description: "Detect test-only commits and suspicious assertion weakening."
