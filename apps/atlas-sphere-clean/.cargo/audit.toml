# cargo-audit configuration
# These vulnerabilities are acknowledged and tracked.
# They come from framework dependencies (Substrate rev 948fbd2, Solana/Agave v3.1.8)
# that cannot be updated without a full framework upgrade.
#
# Review this file when upgrading Substrate or Solana SDK versions.
# Last reviewed: 2026-02-14

[advisories]

# ── Substrate framework dependencies (pinned by rev 948fbd2 / polkadot-v1.1.0) ──

# curve25519-dalek 2.1.3 / 3.2.0 — timing side-channel in Scalar29/52::sub
