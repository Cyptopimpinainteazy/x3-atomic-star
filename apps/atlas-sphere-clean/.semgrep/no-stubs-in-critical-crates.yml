rules:
  # ── todo!/unimplemented! in consensus/bridge/VM crates ─────────────────────
  - id: no-todo-in-consensus
    patterns:
      - pattern: todo!(...)
    message: |
      todo!() found in a critical crate ($PATH). This will panic at runtime.
      Replace with a real implementation or move behind a non-default feature flag.
    languages: [rust]
    severity: ERROR
    paths:
      include:
        - pallets/x3-kernel/**
        - pallets/atomic-trade-engine/**
        - pallets/governance/**
        - pallets/svm-runtime/**
        - pallets/x3-verifier/**
        - pallets/x3-settlement-engine/**
        - crates/cross-vm-bridge/**
        - crates/x3-bridge/**
        - crates/x3-atomic-trade/**
        - crates/evm-integration/**
        - crates/svm-integration/**
        - crates/gpu-swarm/**
        - crates/x3-gpu-validator-swarm/**
        - runtime/**
        - node/**

  - id: no-unimplemented-in-consensus
    patterns:
      - pattern: unimplemented!(...)
    message: |
      unimplemented!() found in a critical crate ($PATH). This panics unconditionally.
      Implement the function or gate behind a feature flag.
    languages: [rust]
    severity: ERROR
    paths:
      include:
        - pallets/x3-kernel/**
        - pallets/atomic-trade-engine/**
        - pallets/governance/**
        - pallets/svm-runtime/**
        - pallets/x3-verifier/**
        - pallets/x3-settlement-engine/**
        - crates/cross-vm-bridge/**
        - crates/x3-bridge/**
        - crates/x3-atomic-trade/**
        - crates/evm-integration/**
        - crates/svm-integration/**
        - crates/gpu-swarm/**
        - crates/x3-gpu-validator-swarm/**
        - runtime/**
        - node/**

  # ── panic! in runtime-critical paths ───────────────────────────────────────
  - id: no-panic-in-runtime
    patterns:
      - pattern: panic!(...)
    message: |
      panic!() found in runtime or consensus code ($PATH).
      Panics bring down the validator node. Use Result/Option and propagate errors.
    languages: [rust]
    severity: WARNING
    paths:
      include:
        - runtime/**
        - pallets/x3-kernel/**
        - pallets/svm-runtime/**
        - pallets/x3-verifier/**
        - crates/cross-vm-bridge/**
        - crates/x3-atomic-trade/**
        - crates/gpu-swarm/**
        - crates/x3-gpu-validator-swarm/**
      exclude:
        - "**/*_test*"
        - "**/tests/**"
        - "**/test_*.rs"

  # ── dbg! left in production paths ──────────────────────────────────────────
  - id: no-dbg-in-prod
    patterns:
      - pattern: dbg!(...)
    message: |
      dbg!() macro found in $PATH. This is a debug leftover.
      Remove before merging to main.
    languages: [rust]
    severity: WARNING
    paths:
      exclude:
        - "**/tests/**"
        - "**/*_test*"

  # ── hardcoded dev/test private keys ────────────────────────────────────────
  - id: no-hardcoded-dev-keys
    patterns:
      - pattern: |
          "//Alice"
      - pattern: |
          "//Bob"
      - pattern: |
          "//Charlie"
      - pattern: |
          subxt_signer::sr25519::dev::alice()
      - pattern: |
          subxt_signer::sr25519::dev::bob()
    message: |
      Hardcoded dev key ($MATCHED) found in $PATH.
      These are well-known test keys. Never use in production paths.
    languages: [rust]
    severity: ERROR
    paths:
      exclude:
        - "**/tests/**"
        - "**/*_test*"
        - "**/examples/**"
        - "**/test_*.rs"

  # ── localhost / dev RPC endpoints ──────────────────────────────────────────
  - id: no-localhost-rpc-in-prod
    patterns:
      - pattern: |
          "http://localhost:..."
      - pattern: |
          "ws://localhost:..."
      - pattern: |
          "http://127.0.0.1:..."
      - pattern: |
          "ws://127.0.0.1:..."
    message: |
      Hardcoded localhost RPC ($MATCHED) in $PATH.
      Use configuration/environment variables. Never hardcode dev endpoints.
    languages: [rust]
    severity: ERROR
    paths:
      exclude:
        - "**/tests/**"
        - "**/*_test*"
        - "**/examples/**"
        - "**/test_*.rs"

  # ── unwrap() in bridge/VM dispatch layer ───────────────────────────────────
  - id: no-unwrap-in-bridge
    patterns:
      - pattern: $E.unwrap()
    message: |
      .unwrap() in $PATH will panic on any unexpected state.
      Use ? operator or handle the error explicitly in bridge/VM code.
    languages: [rust]
    severity: WARNING
    paths:
      include:
        - crates/cross-vm-bridge/**
        - crates/x3-bridge/**
        - crates/x3-atomic-trade/**
        - pallets/x3-settlement-engine/**
      exclude:
        - "**/tests/**"
        - "**/test_*.rs"

  # ── expect() with non-descriptive messages ─────────────────────────────────
  - id: no-bare-expect-in-critical
    patterns:
      - pattern: $E.expect("TODO")
      - pattern: $E.expect("fixme")
      - pattern: $E.expect("FIXME")
      - pattern: $E.expect("")
    message: |
      .expect() with placeholder message in $PATH.
      Replace with a proper error message explaining what invariant was violated.
    languages: [rust]
    severity: WARNING
