apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: x3-app-store-ingress
  namespace: x3-app-store
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/client-max-body-size: "50m"
spec:
  tls:
  - hosts:
    - x3-app-store.com
    - www.x3-app-store.com
    secretName: x3-app-store-tls
  rules:
  - host: x3-app-store.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: x3-app-store-frontend
            port:
              number: 3001
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: x3-app-store-backend
            port:
              number: 3000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: x3-app-store-backend
            port:
              number: 3000
  - host: www.x3-app-store.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: x3-app-store-frontend
            port:
              number: 3001
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: x3-app-store-backend
            port:
              number: 3000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: x3-app-store-backend
            port:
              number: 3000