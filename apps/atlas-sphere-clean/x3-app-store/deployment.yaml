# X3 App Store Deployment Configuration
# This file contains deployment settings for different environments

# Production Environment
production:
  backend:
    image: x3-app-store-backend:latest
    replicas: 3
    port: 3000
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://production-mongo:27017/x3-app-store
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  frontend:
    image: x3-app-store-frontend:latest
    replicas: 2
    port: 3001
    environment:
      - NODE_ENV=production
      - API_URL=https://api.x3-app-store.com
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  github-scraper:
    image: x3-app-store-scraper:latest
    replicas: 1
    schedule: "0 */6 * * *"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://production-mongo:27017/x3-app-store
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  treasury:
    image: x3-app-store-treasury:latest
    replicas: 1
    schedule: "0 */6 * * *"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://production-mongo:27017/x3-app-store
      - COINGECKO_API_URL=https://api.coingecko.com/api/v3
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  app-store-manager:
    image: x3-app-store-manager:latest
    replicas: 1
    schedule: "0 */6 * * *"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://production-mongo:27017/x3-app-store
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# Staging Environment
staging:
  backend:
    image: x3-app-store-backend:staging
    replicas: 1
    port: 3000
    environment:
      - NODE_ENV=staging
      - MONGODB_URI=mongodb://staging-mongo:27017/x3-app-store
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  frontend:
    image: x3-app-store-frontend:staging
    replicas: 1
    port: 3001
    environment:
      - NODE_ENV=staging
      - API_URL=https://staging-api.x3-app-store.com
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Development Environment
development:
  backend:
    image: x3-app-store-backend:dev
    replicas: 1
    port: 3000
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://localhost:27017/x3-app-store
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

  frontend:
    image: x3-app-store-frontend:dev
    replicas: 1
    port: 3001
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:3000
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Services
services:
  mongodb:
    image: mongo:6.0
    port: 27017
    storage: 10Gi
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}

  redis:
    image: redis:7-alpine
    port: 6379
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

# Monitoring
monitoring:
  prometheus:
    image: prom/prometheus:latest
    port: 9090
    storage: 50Gi

  grafana:
    image: grafana/grafana:latest
    port: 3000
    storage: 10Gi

# Logging
logging:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    port: 9200
    storage: 100Gi

  kibana:
    image: docker.elastic.co/kibana/kibana:8.6.2
    port: 5601