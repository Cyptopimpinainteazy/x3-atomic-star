apiVersion: v1
kind: Secret
metadata:
  name: x3-validator-keys
  namespace: x3-chain
  labels:
    app: x3-chain
    component: validator-keys
type: Opaque
data:
  # Base64-encoded placeholder node keys (replace with actual keys)
  # Generate with: ed25519-dalek or use existing keys from Phase 5
  node-key-0: "" # Replace with base64-encoded validator-0 node key
  node-key-1: "" # Replace with base64-encoded validator-1 node key
  node-key-2: "" # Replace with base64-encoded validator-2 node key

---
apiVersion: v1
kind: Secret
metadata:
  name: x3-postgres-credentials
  namespace: x3-chain
  labels:
    app: x3-indexer
    component: database
type: Opaque
stringData:
  # Database credentials (will be referenced by Indexer Deployment)
  POSTGRES_USER: indexer
  POSTGRES_PASSWORD: indexer  # Change in production!
  POSTGRES_DB: x3_indexer
  DATABASE_URL: "postgresql://indexer:indexer@postgres:5432/x3_indexer"

---
apiVersion: v1
kind: Secret
metadata:
  name: x3-indexer-secrets
  namespace: x3-chain
  labels:
    app: x3-indexer
    component: secrets
type: Opaque
stringData:
  # Indexer runtime secrets
  LOG_LEVEL: info
  GRAPHQL_MAX_COMPLEXITY: "1000"
  GRAPHQL_MAX_DEPTH: "20"
  RPC_TIMEOUT_MS: "30000"
  CACHE_TTL_SECONDS: "60"
